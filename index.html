<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 비밀 메신저 – 이모티콘·짤·스티커·완전암호화</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src *; media-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; referrer no-referrer;">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --bg: #06090f; --surface: #0f141e; --card: rgba(15,20,30,0.9);
      --text: #e0e5f0; --sub: #8892b0; --accent: #5b8df0; --danger: #f97070;
      --success: #45d68a; --border: #1a2332; --radius: 20px; --radius-sm: 14px;
    }
    * { margin:0; padding:0; box-sizing:border-box; user-select: none !important; -webkit-user-select: none !important; -moz-user-select: none !important; -webkit-touch-callout: none !important; -webkit-tap-highlight-color: transparent; -webkit-user-modify: read-only; }
    input, textarea { -webkit-user-modify: read-write !important; user-select: text !important; -webkit-user-select: text !important; }
    @media print { html, body, .container, #app { display: none !important; } html::before { content: "🔒 인쇄가 차단되었습니다."; color: red; font-size: 3rem; text-align: center; display: block; padding-top: 50vh; } }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
      -webkit-backface-visibility: hidden; backface-visibility: hidden; overscroll-behavior: none;
    }
    .container {
      width: 100%; max-width: 900px; height: 95dvh;
      background: var(--surface); border-radius: 30px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    #antiScreenshotCanvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index: 9998; pointer-events: none; opacity: 0.03; mix-blend-mode: difference;
    }
    .blur-target { filter: blur(12px) !important; transition: filter 0.2s ease; cursor: pointer; }
    .blur-target.revealed { filter: blur(0) !important; }
    .blur-target.locked { filter: blur(20px) !important; cursor: not-allowed; pointer-events: auto; }

    .header { padding:14px 20px; background:rgba(8,14,24,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .header h1 { font-size:1.1rem; font-weight:700; background:linear-gradient(135deg,#90b4ff,#b794f4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-bar { display:flex; align-items:center; gap:7px; }
    .dot { width:10px; height:10px; border-radius:50%; transition:0.2s; }
    .dot.on { background:var(--success); box-shadow:0 0 10px var(--success); }
    .dot.off { background:var(--danger); }

    #app { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:240px; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; }
    .sidebar .peer-item {
      padding:12px 16px; cursor:pointer; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:8px; font-size:0.85rem;
    }
    .peer-item:hover { background:rgba(255,255,255,0.05); }
    .peer-item.active { background:rgba(91,141,240,0.15); border-left:3px solid var(--accent); }
    .main-chat { flex:1; display:flex; flex-direction:column; }
    #chatScreen { display:none; flex-direction:column; flex:1; }
    #messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:6px 16px; }
    .msg { display:flex; flex-direction:column; animation:fadeUp 0.2s ease; }
    .msg.system { align-items:center; } .msg.me { align-items:flex-end; } .msg.other { align-items:flex-start; }
    .bubble { max-width:83%; padding:10px 16px; border-radius:20px; background:rgba(22,30,44,0.85); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); word-break:break-word; position:relative; overflow:hidden; z-index:1; }
    .bubble .noise-layer {
      position: absolute; top:0; left:0; width:100%; height:100%;
      background: repeating-linear-gradient(transparent 0px, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
      pointer-events: none; z-index:2;
    }
    .msg.system .bubble { background:rgba(255,255,255,0.04); border:none; font-size:0.78rem; color:var(--sub); }
    .msg.me .bubble { background:linear-gradient(140deg,rgba(74,130,250,0.5),rgba(124,92,240,0.5)); border-bottom-right-radius:6px; }
    .msg.other .bubble { border-bottom-left-radius:6px; }
    .msg .time { font-size:0.65rem; color:var(--sub); margin-top:4px; display:flex; justify-content:flex-end; gap:6px; position:relative; z-index:5; }
    .msg .read-status { font-size:0.6rem; color:var(--success); }
    .encrypted-bubble { background:#0a0f18; border:1px solid var(--border); font-family:monospace; font-size:0.7rem; color:#94a3b8; white-space:pre-wrap; word-break:break-all; padding:10px; border-radius:12px; max-width:90%; }
    .progress { height:3px; background:#1e293b; border-radius:2px; overflow:hidden; margin-top:6px; }
    .progress-bar { height:100%; width:0%; background:var(--accent); transition:width 0.3s; }
    .file-preview img, .file-preview video { max-width:200px; max-height:200px; border-radius:12px; border:1px solid var(--border); }
    .sticker-img { max-width:120px; max-height:120px; }
    .gif-img { max-width:200px; max-height:200px; border-radius:12px; }

    .input-bar { display:flex; gap:6px; padding:10px 16px; align-items:flex-end; border-top:1px solid var(--border); }
    #msgInput { flex:1; min-height:42px; max-height:110px; resize:none; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 15px; font-size:0.95rem; outline:none; }
    .icon-btn { background:none; border:none; font-size:1.3rem; cursor:pointer; padding:8px; color:var(--accent); }
    .send-btn { background:var(--accent); color:white; width:42px; height:42px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; }
    .action-bar { display:flex; gap:4px; padding:4px 16px 0; }
    .action-btn { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:14px; cursor:pointer; font-size:0.8rem; }
    .action-btn:hover { background:rgba(255,255,255,0.1); }
    .emoji-picker, .sticker-picker, .gif-picker { display:none; position:absolute; bottom:100%; left:16px; right:16px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:12px; max-height:200px; overflow-y:auto; z-index:10; display:flex; flex-wrap:wrap; gap:8px; }
    .emoji-picker.active, .sticker-picker.active, .gif-picker.active { display:flex; }
    .emoji-item, .sticker-item, .gif-item { cursor:pointer; font-size:1.5rem; padding:4px; border-radius:8px; }
    .emoji-item:hover, .sticker-item:hover, .gif-item:hover { background:rgba(255,255,255,0.1); }
    .gif-item img { max-width:100px; max-height:100px; border-radius:8px; }

    .hidden { display:none !important; }
    .text-center { text-align:center; } .text-sub { color:var(--sub); font-size:0.82rem; }
    .mt { margin-top:10px; } .mb { margin-bottom:10px; }
    .link-box { word-break:break-all; background:#0a0f18; padding:10px; border-radius:12px; font-size:0.72rem; margin:8px 0; max-height:75px; overflow-y:auto; color:#9aa4bf; }
    .fingerprint { font-family:monospace; font-size:0.65rem; background:#0a0f18; padding:6px; border-radius:8px; word-break:break-all; }
    #noChatSelected { flex:1; display:flex; align-items:center; justify-content:center; color:var(--sub); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner { width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); padding:10px 16px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:0.85rem; transition:0.2s; backdrop-filter:blur(10px); }
    .btn:hover { background:rgba(255,255,255,0.12); }
    .btn.primary { background:var(--accent); border:none; }
    .btn.danger { background:var(--danger); border:none; }
  </style>
</head>
<body>
<canvas id="antiScreenshotCanvas"></canvas>
<div class="container">
  <div class="header"><h1>🔐 P2P 비밀 메신저</h1><div class="status-bar"><span id="connDot" class="dot off"></span><span id="connLabel">오프라인</span></div></div>
  <div id="app">
    <div class="sidebar" id="sidebar">
      <div style="padding:10px; border-bottom:1px solid var(--border);">
        <button class="btn primary" onclick="addContact()" style="width:100%;">＋ 연락처 추가</button>
      </div>
      <div id="peerList"></div>
    </div>
    <div class="main-chat" id="mainChat">
      <div id="noChatSelected">연락처를 선택하거나 추가하세요</div>
      <div id="chatScreen">
        <div id="securityCard" class="card" style="margin:0 0 4px; padding:8px 14px; font-size:0.75rem; display:none; align-items:center; gap:6px;">
          <span>🔒</span><span id="sessionFingerprint" class="fingerprint blur-target" style="flex:1;"></span>
          <button class="btn danger" style="padding:4px 10px; font-size:0.7rem;" onclick="destroyActiveChat()">💣 폭파</button>
        </div>
        <div id="messages"></div>
        <div class="action-bar" id="actionBar" style="position:relative;">
          <button class="action-btn" onclick="togglePicker('emoji')">😀 이모지</button>
          <button class="action-btn" onclick="togglePicker('sticker')">⭐ 스티커</button>
          <button class="action-btn" onclick="togglePicker('gif')">🎞️ 짤</button>
          <div class="emoji-picker" id="emojiPicker"></div>
          <div class="sticker-picker" id="stickerPicker"></div>
          <div class="gif-picker" id="gifPicker"></div>
        </div>
        <div class="input-bar">
          <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="파일">📎</button>
          <textarea id="msgInput" rows="1" placeholder="메시지 (종단간 암호화)"></textarea>
          <button class="send-btn" onclick="sendText()">➤</button>
        </div>
        <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
      </div>
    </div>
  </div>
</div>

<script>
// =====================================================================
//  완전체 P2P 비밀 메신저 – 모든 메타데이터 암호화 + 이모지·스티커·짤
// =====================================================================
const textEncoder = new TextEncoder();
const textDecoder = new TextDecoder();
const toBase64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
const fromBase64url = str => { str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; return Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer; };
const encodeSDP = obj => toBase64url(textEncoder.encode(JSON.stringify(obj)));
const decodeSDP = str => JSON.parse(textDecoder.decode(fromBase64url(str)));

// 200 ICE 서버 (이전과 동일)
const ICE_SERVERS = (() => {
  const servers = [];
  const addSTUN = (host, ports = [3478, 5349, 19302, 10000]) => ports.forEach(p => servers.push({ urls: `stun:${host}:${p}` }));
  const addTURN = (host, ports = [3478], user, cred) => ports.forEach(p => {
    servers.push({ urls: `turn:${host}:${p}`, username: user, credential: cred });
    servers.push({ urls: `turn:${host}:${p}?transport=tcp`, username: user, credential: cred });
  });
  const hosts = [
    'stun.l.google.com','stun1.l.google.com','stun2.l.google.com','stun3.l.google.com','stun4.l.google.com',
    'stun.cloudflare.com','global.stun.twilio.com','stun.freeswitch.org','stun.nextcloud.com',
    'stun.viagenie.ca','stun.ekiga.net','stun.linphone.org','stun.iptel.org','stun.services.mozilla.com',
    'stun.sipgate.net','stun.schlund.de','stun.voiparound.com','stun.voipbuster.com','stun.voipstunt.com',
    'stun.12voip.com','stun.1und1.de','stun.gmx.net','stun.web.de','stun.rockenstein.de','stun.voipgate.com',
    'stun.phonepower.com','stun.12connect.com','stun.3cx.com','stun.aetaaudio.com','stun.audiocodes.com',
    'stun.bandwidth.com','stun.callcentric.com','stun.counterpath.com','stun.dls.net','stun.easyvoip.com',
    'stun.halonet.pl','stun.internetcalls.com','stun.intervoip.com','stun.ipcomms.net','stun.it1.de',
    'stun.justvoip.com','stun.livevoip.com','stun.lowratevoip.com','stun.netappel.com','stun.netelip.com',
    'stun.nfon.net','stun.nonoh.net','stun.ooma.com','stun.pbxes.com','stun.phoneserve.com',
    'stun.sipdiscount.com','stun.sipnet.net','stun.smartvoip.com','stun.speedflow.com','stun.t-online.de',
    'stun.telbo.com','stun.telio.no','stun.telstra.com','stun.tng.de','stun.twt.it','stun.vivox.com',
    'stun.voip.aebc.com','stun.voip.eutelia.it','stun.voipcheap.com','stun.voipdiscount.com',
    'stun.voipraider.com','stun.vonage.com','stun.voxox.com','stun.zadarma.com'
  ];
  hosts.forEach(h => addSTUN(h));
  addTURN('openrelay.metered.ca', [80, 443], 'openrelayproject', 'openrelayproject');
  addTURN('turn.anyfirewall.com', [443], 'webrtc', 'webrtc');
  addTURN('numb.viagenie.ca', [3478, 80, 443], 'webrtc@live.com', 'muazkh');
  addTURN('turn.matrix.org', [3478], 'matrix', 'matrix');
  const seen = new Set();
  return servers.filter(s => { const k = JSON.stringify(s); if (seen.has(k)) return false; seen.add(k); return true; }).slice(0, 200);
})();

// ==================== 멀티 세션 관리 ====================
const sessions = {};
let activePeerId = null;

function getOrCreateSession(peerId) {
  if (!sessions[peerId]) {
    sessions[peerId] = {
      pc: null, dc: null, isOfferer: false, password: null,
      authKey: null, sessionKey: null, sendChain: null, recvChain: null,
      salt: null, ourEcdhPair: null, peerEcdhPub: null,
      handshakeDone: false, isOnline: false,
      pendingOutbox: [], receivedMessageIds: new Set(),
      fileReceive: null, typingTimer: null
    };
  }
  return sessions[peerId];
}

// ==================== 연락처 관리 ====================
function getContacts() { try { return JSON.parse(localStorage.getItem('p2p_contacts') || '[]'); } catch (e) { return []; } }
function saveContacts(contacts) { localStorage.setItem('p2p_contacts', JSON.stringify(contacts)); }
function addContact() {
  const name = prompt('연락처 이름:');
  if (!name) return;
  const id = prompt('연락처 ID (상대와 동일하게):');
  if (!id) return;
  const contacts = getContacts();
  if (contacts.find(c => c.id === id)) { alert('이미 존재하는 ID입니다.'); return; }
  contacts.push({ id, name });
  saveContacts(contacts);
  renderPeerList();
}
function renderPeerList() {
  const list = document.getElementById('peerList');
  const contacts = getContacts();
  list.innerHTML = contacts.map(c => {
    const sess = sessions[c.id];
    const online = sess && sess.isOnline;
    return `<div class="peer-item ${c.id === activePeerId ? 'active' : ''}" onclick="selectPeer('${c.id}')">
      <span class="dot ${online ? 'on' : 'off'}"></span>
      <span>${escapeHtml(c.name)}</span>
    </div>`;
  }).join('');
}

// ==================== 세션 전환 ====================
function selectPeer(peerId) {
  activePeerId = peerId;
  document.getElementById('noChatSelected').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('messages').innerHTML = '';
  const sess = getOrCreateSession(peerId);
  updateConn(sess.isOnline);
  if (sess.sessionKey) {
    document.getElementById('securityCard').style.display = 'flex';
    document.getElementById('sessionFingerprint').textContent = '세션 활성';
  } else {
    document.getElementById('securityCard').style.display = 'none';
    const pw = prompt('이 채팅방의 암호를 입력하세요 (상대와 동일):');
    if (pw) {
      sess.password = pw;
      connectToPeer(peerId);
    }
  }
  renderPeerList();
}

// ==================== WebRTC 세션 ====================
async function connectToPeer(peerId) {
  const sess = getOrCreateSession(peerId);
  if (sess.pc) return;
  sess.isOfferer = true;
  sess.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  sess.pc.oniceconnectionstatechange = () => {
    const state = sess.pc.iceConnectionState;
    if (state === 'connected' || state === 'completed') { sess.isOnline = true; updateConn(true); }
    else if (state === 'disconnected') { sess.isOnline = false; updateConn(false); sess.pc.restartIce(); }
    else if (state === 'failed' || state === 'closed') { sess.isOnline = false; updateConn(false); }
  };
  sess.pc.ondatachannel = e => {
    if (e.channel.label === 'chat') { sess.dc = e.channel; setupDC(peerId); }
  };
  sess.dc = sess.pc.createDataChannel('chat', { ordered: true });
  setupDC(peerId);
  sess.pc.createOffer().then(o => sess.pc.setLocalDescription(o)).then(() => waitIce(sess.pc).then(() => {
    const offerB64 = encodeSDP(sess.pc.localDescription);
    const link = location.origin + location.pathname + '#offer=' + offerB64 + '&peer=' + peerId;
    alert('상대에게 이 링크를 전송하세요:\n' + link);
  }));
}

function setupDC(peerId) {
  const sess = sessions[peerId];
  if (!sess || !sess.dc) return;
  sess.dc.onopen = () => {
    sess.isOnline = true; updateConn(true);
    flushOutbox(peerId);
    if (!sess.handshakeDone && !sess.sessionKey) startEcdhExchange(peerId);
  };
  sess.dc.onmessage = e => onMsg(peerId, e);
  sess.dc.onclose = () => { sess.isOnline = false; updateConn(false); };
}

function waitIce(pc) {
  return new Promise(r => {
    if (pc.iceGatheringState === 'complete') r();
    else pc.addEventListener('icegatheringstatechange', () => { if (pc.iceGatheringState === 'complete') r(); });
  });
}

// ==================== 시그널링 처리 ====================
async function checkHash() {
  const h = location.hash.substring(1); if (!h) return;
  const p = new URLSearchParams(h);
  if (p.has('offer') && p.has('peer')) {
    const peerId = p.get('peer');
    const offer = decodeSDP(p.get('offer'));
    const sess = getOrCreateSession(peerId);
    sess.isOfferer = false;
    sess.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
    sess.pc.oniceconnectionstatechange = () => {
      const state = sess.pc.iceConnectionState;
      if (state === 'connected' || state === 'completed') { sess.isOnline = true; updateConn(true); }
      else if (state === 'disconnected') { sess.isOnline = false; updateConn(false); sess.pc.restartIce(); }
      else if (state === 'failed' || state === 'closed') { sess.isOnline = false; updateConn(false); }
    };
    sess.pc.ondatachannel = e => { if (e.channel.label === 'chat') { sess.dc = e.channel; setupDC(peerId); } };
    await sess.pc.setRemoteDescription(offer);
    const ans = await sess.pc.createAnswer();
    await sess.pc.setLocalDescription(ans);
    await waitIce(sess.pc);
    const answerB64 = encodeSDP(sess.pc.localDescription);
    const link = location.origin + location.pathname + '#answer=' + answerB64 + '&peer=' + peerId;
    alert('이 Answer 링크를 상대에게 보내세요:\n' + link);
    activePeerId = peerId;
    document.getElementById('noChatSelected').style.display = 'none';
    document.getElementById('chatScreen').style.display = 'flex';
    document.getElementById('securityCard').style.display = 'none';
    renderPeerList();
  } else if (p.has('answer') && p.has('peer')) {
    const peerId = p.get('peer');
    const answer = decodeSDP(p.get('answer'));
    const sess = sessions[peerId];
    if (sess && sess.pc && sess.isOfferer) {
      await sess.pc.setRemoteDescription(answer);
    }
  }
}
window.addEventListener('hashchange', checkHash);

// ==================== 암호화 엔진 (P-521, SHA-512, AES-256) ====================
const ECDH_ALG = { name: 'ECDH', namedCurve: 'P-521' };
const PBKDF2_ITERS = 1000000, SALT_SIZE = 128, AES_LEN = 256, HMAC_HASH = 'SHA-512';

async function startEcdhExchange(peerId) {
  const sess = sessions[peerId];
  try {
    const keyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
    sess.ourEcdhPair = { privateKey: keyPair.privateKey, publicKey: keyPair.publicKey };
    const pubRaw = await crypto.subtle.exportKey('raw', sess.ourEcdhPair.publicKey);
    if (sess.isOfferer) {
      sess.salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE));
      sess.dc.send(JSON.stringify({ type: '__ecdhe__', salt: buf2b64(sess.salt.buffer), pubKey: buf2b64(pubRaw) }));
    } else {
      sess.dc.send(JSON.stringify({ type: '__ecdhe__', pubKey: buf2b64(pubRaw) }));
    }
  } catch (e) { addMsg(peerId, '보안 오류', 'system'); }
}

async function handleEcdheMessage(peerId, data) {
  const sess = sessions[peerId];
  if (sess.handshakeDone) return;
  try {
    if (data.salt) sess.salt = new Uint8Array(b642buf(data.salt));
    sess.peerEcdhPub = await crypto.subtle.importKey('raw', b642buf(data.pubKey), ECDH_ALG, true, []);
    if (sess.password && sess.ourEcdhPair && sess.peerEcdhPub && sess.salt) await deriveSessionKey(peerId);
  } catch (e) { addMsg(peerId, '키 교환 실패', 'system'); }
}

async function deriveSessionKey(peerId) {
  const sess = sessions[peerId];
  const km = await crypto.subtle.importKey('raw', str2buf(sess.password), 'PBKDF2', false, ['deriveKey']);
  sess.authKey = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: sess.salt, iterations: PBKDF2_ITERS, hash: 'SHA-512' }, km, { name: 'AES-GCM', length: AES_LEN }, true, ['encrypt', 'decrypt']);
  const ecdhBits = await crypto.subtle.deriveBits({ name: 'ECDH', public: sess.peerEcdhPub }, sess.ourEcdhPair.privateKey, 521);
  const authRaw = await crypto.subtle.exportKey('raw', sess.authKey);
  const ikm = concatBufs(ecdhBits, str2buf(sess.password));
  const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveKey']);
  sess.sessionKey = await crypto.subtle.deriveKey({ name: 'HKDF', hash: 'SHA-512', salt: authRaw, info: str2buf('session') }, hkdfKey, { name: 'AES-GCM', length: AES_LEN }, true, ['encrypt', 'decrypt']);
  const sb = await crypto.subtle.exportKey('raw', sess.sessionKey);
  const chainA = await hkdfExpand(sb, str2buf('chain-a'));
  const chainB = await hkdfExpand(sb, str2buf('chain-b'));
  const ourPub = await crypto.subtle.exportKey('raw', sess.ourEcdhPair.publicKey);
  const peerPub = await crypto.subtle.exportKey('raw', sess.peerEcdhPub);
  const weAreSmaller = compareBuffers(new Uint8Array(ourPub), new Uint8Array(peerPub)) < 0;
  sess.sendChain = weAreSmaller ? { chain: chainA, seq: 0 } : { chain: chainB, seq: 0 };
  sess.recvChain = weAreSmaller ? { chain: chainB, seq: -1 } : { chain: chainA, seq: -1 };
  sess.handshakeDone = true;
  document.getElementById('securityCard').style.display = 'flex';
  document.getElementById('sessionFingerprint').textContent = buf2hex(await crypto.subtle.digest('SHA-256', sb)).slice(0, 32);
}

// ==================== 메시지 송수신 (모든 타입 암호화) ====================
async function sendText() {
  if (!activePeerId) return;
  const sess = sessions[activePeerId];
  if (!sess) return;
  const inp = document.getElementById('msgInput'); const txt = inp.value.trim(); if (!txt) return;
  const msgId = genUUID(); const payload = { type: 'text', content: txt, id: msgId };
  await sendPayload(sess, payload, txt, msgId);
  inp.value = '';
}

async function sendPayload(sess, payload, displayContent, msgId) {
  if (!sess.dc || sess.dc.readyState !== 'open' || !sess.sessionKey) {
    if (sess.sessionKey) { sess.pendingOutbox.push({ payload, id: msgId, displayContent }); addMsg(activePeerId, displayContent, 'me', msgId); addMsg(activePeerId, '⏳ 오프라인-복구 시 전송', 'system'); }
    else { addMsg(activePeerId, '⚠️ 암호를 설정하세요.', 'system'); }
    return;
  }
  try {
    const enc = await encryptPayload(sess, payload);
    sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    addMsg(activePeerId, displayContent, 'me', msgId);
  } catch (e) { sess.pendingOutbox.push({ payload, id: msgId, displayContent }); addMsg(activePeerId, displayContent, 'me', msgId); addMsg(activePeerId, '⚠️ 전송 실패-대기열 저장', 'system'); }
}

function onMsg(peerId, e) {
  const sess = sessions[peerId];
  if (!sess) return;
  if (e.data instanceof ArrayBuffer) { handleBinaryChunk(peerId, e.data); return; }
  try {
    const d = JSON.parse(e.data);
    if (d.type === '__ecdhe__') { handleEcdheMessage(peerId, d); return; }
    if (d.type === 'msg') {
      if (!sess.sessionKey) { addEncryptedMessage(peerId, d); return; }
      decryptPayload(sess, d).then(inner => {
        if (inner.id && sess.receivedMessageIds.has(inner.id)) return;
        if (inner.id) sess.receivedMessageIds.add(inner.id);
        switch (inner.type) {
          case 'text': addMsg(peerId, inner.content, 'other', inner.id); sendReadReceipt(peerId, inner.id); break;
          case 'emoji': addMsg(peerId, inner.content, 'other', inner.id); break;
          case 'sticker': addMsg(peerId, `<img src="${inner.url}" class="sticker-img" alt="sticker">`, 'other', inner.id); break;
          case 'gif': addMsg(peerId, `<img src="${inner.url}" class="gif-img" alt="gif">`, 'other', inner.id); break;
          case 'typing': document.getElementById('typingIndicator') && (document.getElementById('typingIndicator').style.display = inner.state ? 'block' : 'none'); break;
          case 'read': markAsRead(peerId, inner.id); break;
          case 'file_start': handleFileStart(peerId, inner); break;
          case 'file_end': if (sess.fileReceive && sess.fileReceive.id === inner.id) assembleFile(peerId); break;
          case '__destroy__': destroyChat(peerId); break;
        }
      }).catch(() => addEncryptedMessage(peerId, d));
    }
  } catch (e) {}
}

async function encryptPayload(sess, obj) {
  if (!sess.sendChain) throw new Error('세션키 없음');
  const mk = await ratchetForward(sess.sendChain);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const padded = { ...obj, _pad: Math.random().toString(36).slice(2, 10) };
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, mk, str2buf(JSON.stringify(padded)));
  return { seq: sess.sendChain.seq++, iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}
async function decryptPayload(sess, d) {
  if (!sess.recvChain) throw new Error('세션키 없음');
  const { seq, iv, ct } = d;
  const prevChain = sess.recvChain.chain, prevSeq = sess.recvChain.seq;
  try {
    if (seq <= sess.recvChain.seq) throw new Error('Invalid seq');
    while (sess.recvChain.seq < seq - 1) { await ratchetForward(sess.recvChain); sess.recvChain.seq++; }
    const mk = await ratchetForward(sess.recvChain);
    sess.recvChain.seq = seq;
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, mk, new Uint8Array(ct));
    const obj = JSON.parse(textDecoder.decode(plain));
    delete obj._pad;
    return obj;
  } catch (e) { sess.recvChain.chain = prevChain; sess.recvChain.seq = prevSeq; throw e; }
}

async function flushOutbox(peerId) {
  const sess = sessions[peerId];
  if (!sess || !sess.dc || sess.dc.readyState !== 'open' || sess.pendingOutbox.length === 0) return;
  const toSend = [...sess.pendingOutbox]; sess.pendingOutbox = [];
  for (const msg of toSend) {
    try { const enc = await encryptPayload(sess, msg.payload); sess.dc.send(JSON.stringify({ type: 'msg', ...enc })); } catch (e) {}
  }
  addMsg(peerId, '📬 대기 메시지 전송 완료', 'system');
}

// ==================== 이모지/스티커/짤 선택기 ====================

function togglePicker(type) {

function closeAllPickers() {

}

// ==================== 읽음 확인, 타이핑 인디케이터 ====================
async function sendReadReceipt(peerId, msgId) {
  const sess = sessions[peerId];
  if (!sess || !sess.sessionKey || !sess.dc || sess.dc.readyState !== 'open') return;
  try { const enc = await encryptPayload(sess, { type: 'read', id: msgId }); sess.dc.send(JSON.stringify({ type: 'msg', ...enc })); } catch (e) {}
}

async function sendTyping(state) {
  if (!activePeerId) return;
  const sess = sessions[activePeerId];
  if (!sess || !sess.sessionKey || !sess.dc || sess.dc.readyState !== 'open') return;
  try { const enc = await encryptPayload(sess, { type: 'typing', state }); sess.dc.send(JSON.stringify({ type: 'msg', ...enc })); } catch (e) {}
}

document.getElementById('msgInput').addEventListener('input', () => {
  sendTyping(true);
  const sess = sessions[activePeerId];
  if (sess) {
    clearTimeout(sess.typingTimer);
    sess.typingTimer = setTimeout(() => sendTyping(false), 1500);
  }
});

function markAsRead(peerId, msgId) {
  const el = document.getElementById('msg-' + msgId);
  if (el) { const t = el.querySelector('.time'); if (t && !t.querySelector('.read-status')) t.innerHTML += ' <span class="read-status">✓✓</span>'; }
}

// ==================== 파일 전송 (대용량) ====================
function handleFileStart(peerId, inner) {
  const sess = sessions[peerId];
  if (!sess) return;
  sess.fileReceive = { id: inner.id, name: inner.name, size: inner.size, fek: b642buf(inner.fek), chunks: [], received: 0 };
  addMsg(peerId, `📥 ${inner.name} (${formatBytes(inner.size)})`, 'other');
}
function handleBinaryChunk(peerId, buf) {
  const sess = sessions[peerId];
  if (!sess || !sess.fileReceive) return;
  sess.fileReceive.chunks.push(new Uint8Array(buf));
  sess.fileReceive.received += buf.byteLength;
}
async function assembleFile(peerId) {
  const sess = sessions[peerId];
  if (!sess || !sess.fileReceive) return;
  const blob = new Blob(sess.fileReceive.chunks);
  const iv = blob.slice(0, 12); const ct = blob.slice(12);
  const key = await crypto.subtle.importKey('raw', sess.fileReceive.fek, 'AES-GCM', false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: await iv.arrayBuffer() }, key, await ct.arrayBuffer());
  const decBlob = new Blob([plain]); const url = URL.createObjectURL(decBlob);
  addMsg(peerId, `<a href="${url}" download="${escapeHtml(sess.fileReceive.name)}">📎 ${escapeHtml(sess.fileReceive.name)} 다운로드</a>`, 'other');
  sess.fileReceive = null;
}
async function handleFiles(files) { for (const f of files) await sendFile(f); }
async function sendFile(file) {
  if (!activePeerId) return;
  const sess = sessions[activePeerId];
  if (!sess || !sess.dc || sess.dc.readyState !== 'open' || !sess.sessionKey) return;
  const fileId = genUUID();
  const fek = await crypto.subtle.generateKey({ name: 'AES-GCM', length: AES_LEN }, true, ['encrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const fekRaw = await crypto.subtle.exportKey('raw', fek);
  const fileBuf = await file.arrayBuffer();
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, fek, fileBuf);
  const encData = new Uint8Array(iv.byteLength + ct.byteLength);
  encData.set(iv); encData.set(new Uint8Array(ct), iv.byteLength);
  const metaEnc = await encryptPayload(sess, { type: 'file_start', id: fileId, name: file.name, size: encData.byteLength, fek: buf2b64(fekRaw) });
  sess.dc.send(JSON.stringify({ type: 'msg', ...metaEnc }));
  addMsg(activePeerId, `📤 ${file.name} 전송 중...`, 'me');
  const chunkSize = 256 * 1024; let offset = 0;
  while (offset < encData.byteLength) {
    const end = Math.min(offset + chunkSize, encData.byteLength);
    sess.dc.send(encData.slice(offset, end).buffer);
    offset = end;
    await new Promise(r => setTimeout(r, 10));
  }
  const endEnc = await encryptPayload(sess, { type: 'file_end', id: fileId });
  sess.dc.send(JSON.stringify({ type: 'msg', ...endEnc }));
  addMsg(activePeerId, `📤 ${file.name} 전송 완료`, 'me');
}

// ==================== 대화 파괴 ====================
async function destroyActiveChat() { if (activePeerId) await destroyChat(activePeerId); }
async function destroyChat(peerId) {
  const sess = sessions[peerId];
  if (!sess) return;
  if (sess.sessionKey && sess.dc && sess.dc.readyState === 'open') {
    try { const enc = await encryptPayload(sess, { type: '__destroy__', timestamp: Date.now() }); sess.dc.send(JSON.stringify({ type: 'msg', ...enc })); } catch (e) {}
  }
  if (sess.pc) sess.pc.close();
  delete sessions[peerId];
  if (activePeerId === peerId) {
    document.getElementById('messages').innerHTML = '';
    document.getElementById('chatScreen').style.display = 'none';
    document.getElementById('noChatSelected').style.display = 'flex';
    activePeerId = null;
  }
  renderPeerList();
}

// ==================== 유틸리티 ====================
const buf2hex = b => [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
const str2buf = s => textEncoder.encode(s);
const buf2b64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
const b642buf = s => Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;
const concatBufs = (...bufs) => { let len=bufs.reduce((a,b)=>a+b.byteLength,0), tmp=new Uint8Array(len), off=0; bufs.forEach(b=>{tmp.set(new Uint8Array(b),off);off+=b.byteLength;}); return tmp.buffer; };
const genUUID = () => crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g,c=>{const r=crypto.getRandomValues(new Uint8Array(1))[0]%16;return(c=='x'?r:r&0x3|0x8).toString(16);});
function formatBytes(b) { return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':b<1073741824?(b/1048576).toFixed(1)+' MB':(b/1073741824).toFixed(1)+' GB'; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function updateConn(ok) {
  document.getElementById('connDot').className = 'dot ' + (ok ? 'on' : 'off');
  document.getElementById('connLabel').textContent = ok ? '연결됨' : '오프라인';
}
function compareBuffers(b1, b2) { for (let i = 0; i < b1.byteLength; i++) { if (b1[i] < b2[i]) return -1; if (b1[i] > b2[i]) return 1; } return 0; }
async function hkdfExpand(prk, info) {
  const k = await crypto.subtle.importKey('raw', prk, { name: 'HMAC', hash: HMAC_HASH }, false, ['sign']);
  const s = await crypto.subtle.sign('HMAC', k, info);
  return crypto.subtle.importKey('raw', s.slice(0, 32), { name: 'HMAC', hash: HMAC_HASH }, false, ['sign']);
}
async function ratchetForward(chainRef) {
  const cur = chainRef.chain;
  const newChain = await crypto.subtle.sign('HMAC', cur, new Uint8Array([2]));
  chainRef.chain = await crypto.subtle.importKey('raw', newChain.slice(0, 32), { name: 'HMAC', hash: HMAC_HASH }, false, ['sign']);
  const msgKey = await crypto.subtle.sign('HMAC', cur, new Uint8Array([1]));
  return crypto.subtle.importKey('raw', msgKey.slice(0, 32), { name: 'AES-GCM', length: AES_LEN }, false, ['encrypt', 'decrypt']);
}
function addMsg(peerId, text, who, msgId) {
  if (peerId !== activePeerId) return;
  const c = document.getElementById('messages'), d = document.createElement('div');
  d.className = 'msg ' + (who === 'me' ? 'me' : who === 'other' ? 'other' : 'system');
  if (msgId) d.id = 'msg-' + msgId;
  let timeHtml = `<div class="time">${new Date().toLocaleTimeString()}</div>`;
  d.innerHTML = `<div class="bubble blur-target">${text}${timeHtml}<div class="noise-layer"></div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function addEncryptedMessage(peerId, rawData) {
  if (peerId !== activePeerId) return;
  const c = document.getElementById('messages'), d = document.createElement('div');
  d.className = 'msg system';
  d.innerHTML = `<div class="encrypted-bubble blur-target"><strong>🔒 암호화된 메시지</strong><br>${escapeHtml(JSON.stringify(rawData, null, 2))}</div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
