<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 암호 채팅 – 궁극의 보안</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src *; media-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; referrer no-referrer;">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --bg: #06090f; --surface: #0f141e; --card: rgba(15,20,30,0.9);
      --text: #e0e5f0; --sub: #8892b0; --accent: #5b8df0; --danger: #f97070;
      --success: #45d68a; --border: #1a2332; --radius: 20px; --radius-sm: 14px;
    }
    * { 
      margin:0; padding:0; box-sizing:border-box; 
      user-select: none !important; -webkit-user-select: none !important; -moz-user-select: none !important;
      -webkit-touch-callout: none !important; 
      -webkit-tap-highlight-color: transparent;
    }
    input, textarea {
      user-select: text !important; -webkit-user-select: text !important;
      -webkit-user-modify: read-write !important;
    }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
      overscroll-behavior: none;
    }
    .container {
      width: 100%; max-width: 520px; height: 95dvh;
      background: var(--surface); border-radius: 30px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    .header { padding: 14px 20px; background: rgba(8,14,24,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.1rem; font-weight: 700; background: linear-gradient(135deg,#90b4ff,#b794f4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-bar { display: flex; align-items: center; gap: 7px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; transition: 0.2s; }
    .dot.on { background: var(--success); box-shadow: 0 0 10px var(--success); }
    .dot.off { background: var(--danger); }
    .main-content { flex:1; overflow-y:auto; padding: 16px; display:flex; flex-direction:column; }
    .main-content::-webkit-scrollbar { width:4px; } .main-content::-webkit-scrollbar-thumb { background:#253040; border-radius:2px; }
    .card { background: var(--card); backdrop-filter: blur(14px); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); padding: 12px 20px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.2s; width: 100%; backdrop-filter: blur(10px); }
    .btn:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }
    .btn.primary { background: var(--accent); border: none; }
    .btn.danger { background: var(--danger); border: none; }
    .btn-small { padding: 7px 12px; font-size: 0.8rem; width: auto; }
    .btn-group { display: flex; gap: 8px; } .btn-group .btn { flex:1; }
    input, textarea { width: 100%; background: #0a0f18; color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 15px; font-size: 0.95rem; outline: none; }
    input:focus, textarea:focus { border-color: var(--accent); }

    #chatScreen { display: none; flex-direction: column; flex:1; }
    #messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding: 6px 0; }
    .msg { display: flex; flex-direction: column; animation: fadeUp 0.2s ease; }
    .msg.system { align-items: center; } .msg.me { align-items: flex-end; } .msg.other { align-items: flex-start; }
    .bubble {
      max-width: 83%; padding: 10px 16px; border-radius: 20px;
      background: rgba(22,30,44,0.85); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.05); word-break: break-word;
      filter: blur(8px); transition: filter 0.2s ease;
    }
    .bubble.revealed { filter: blur(0px); }
    .bubble.shield-strong { filter: blur(20px) !important; }
    .msg.system .bubble { background: rgba(255,255,255,0.04); border: none; font-size: 0.78rem; color: var(--sub); filter: none; }
    .msg.me .bubble { background: linear-gradient(140deg,rgba(74,130,250,0.5),rgba(124,92,240,0.5)); border-bottom-right-radius: 6px; }
    .msg.other .bubble { border-bottom-left-radius: 6px; }
    .msg .time { font-size: 0.65rem; color: var(--sub); margin-top: 4px; display: flex; justify-content: flex-end; gap: 6px; }
    .encrypted-bubble {
      background: #0a0f18; border: 1px solid var(--border); font-family: monospace;
      font-size: 0.7rem; color: #94a3b8; white-space: pre-wrap; word-break: break-all;
      padding: 10px; border-radius: 12px; max-width: 90%; filter: blur(8px);
    }
    .typing-indicator { font-size:0.75rem; color:var(--sub); padding:4px 16px; display:none; }
    .progress { height: 3px; background:#1e293b; border-radius:2px; overflow:hidden; margin-top:6px; }
    .progress-bar { height:100%; width:0%; background:var(--accent); transition:width 0.3s; }
    .file-preview img, .file-preview video { max-width:180px; max-height:140px; border-radius:12px; border:1px solid var(--border); filter: blur(8px); }
    .input-bar { display: flex; gap: 6px; padding: 10px 0 0; align-items: flex-end; }
    #msgInput { flex:1; min-height: 42px; max-height: 110px; resize: none; }
    .icon-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; padding: 8px; color: var(--accent); }
    .send-btn { background: var(--accent); color: white; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; }

    /* 민감 정보 블러 */
    .fingerprint, #passwordPrompt, .link-box, #securityCard strong {
      filter: blur(8px); transition: filter 0.2s ease;
    }
    .fingerprint.revealed, #passwordPrompt.revealed, .link-box.revealed {
      filter: blur(0px);
    }

    .hidden { display: none !important; }
    .text-center { text-align: center; } .text-sub { color: var(--sub); font-size: 0.82rem; }
    .mt { margin-top: 10px; } .mb { margin-bottom: 10px; }
    .fingerprint { font-family: monospace; font-size: 0.65rem; background: #0a0f18; padding: 6px; border-radius: 8px; word-break: break-all; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 20px; height: 20px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>🔐 P2P 비밀채팅</h1><div class="status-bar"><span id="connDot" class="dot off"></span><span id="connLabel">오프라인</span></div></div>
  <div class="main-content" id="mainArea">
    <div id="simpleMode">
      <div class="card text-center"><h3 style="margin-bottom:6px;">서버 없이 완벽한 프라이버시</h3><p class="text-sub mb">Signal 수준 종단간 암호화<br>오프라인 대화 폭파 지원</p><button class="btn primary" onclick="app.startNewChat()">✨ 새 채팅 생성</button><button class="btn mt" onclick="app.showJoinPanel()">📩 초대 링크로 참가</button></div>
      <div id="offerPanel" class="hidden"><div class="card text-center"><div class="spinner mb" id="offerSpinner"></div><p><strong>연결 링크 생성 중...</strong></p><p class="text-sub">생성된 링크를 상대에게 전송하세요.</p><div class="link-box" id="offerLinkDisplay">생성 중...</div><button class="btn mt" onclick="app.copyTextById('offerLinkDisplay')">📋 링크 복사</button><p class="text-sub mt">상대가 보낸 Answer 링크를 아래에 붙여넣으세요.</p><input type="text" id="answerLinkInput" placeholder="Answer 링크 입력..."><button class="btn primary mt" onclick="app.applyAnswerLink()">✅ 연결 완료</button></div></div>
      <div id="answerPanel" class="hidden"><div id="autoAnswerContent" class="hidden"><div class="card text-center"><div class="spinner mb" id="answerSpinner"></div><p>초대 링크 분석 중...</p></div><div id="answerReadyPanel" class="hidden card text-center"><p><strong>✅ Answer 링크 준비 완료</strong></p><p class="text-sub">아래 링크를 방장에게 전송하세요.</p><div class="link-box" id="answerLinkDisplay">생성 중...</div><button class="btn mt" onclick="app.copyTextById('answerLinkDisplay')">📋 링크 복사</button></div></div><div id="manualJoinContent"><div class="card"><strong>📥 초대 링크 붙여넣기</strong><textarea id="remoteOfferSDP" rows="3" placeholder="방장의 초대 링크 전체..."></textarea><button class="btn primary mt" onclick="app.createAnswerFromOffer()">🔄 Answer 생성</button></div><div id="answerResultPanel" class="hidden card"><strong>📤 내 Answer 링크</strong><div class="link-box" id="localAnswerLinkDisplay"></div><button class="btn mt" onclick="app.copyTextById('localAnswerLinkDisplay')">📋 복사해서 방장에게 전송</button></div></div></div>
    </div>

    <div id="chatScreen">
      <div id="securityCard" class="card" style="margin:0 0 8px; padding:8px 14px; font-size:0.78rem; display:none; align-items:center; gap:6px;">
        <span>🔒 세션:</span><span id="sessionFingerprint" class="fingerprint" style="flex:1;"></span>
        <button class="btn-small danger" onclick="app.destroyChat()">💣 대화 폭파</button>
      </div>
      <div id="passwordPrompt" class="card text-center">
        <strong>🔐 채팅방 암호 입력</strong>
        <input type="password" id="chatPasswordInput" placeholder="상대와 공유한 암호">
        <button class="btn primary mt" id="submitPasswordBtn" onclick="app.submitPassword()">암호 설정</button>
        <p class="text-sub mt">암호가 없으면 수신된 암호문만 표시됩니다.</p>
        <p id="passwordError" class="text-sub" style="color:var(--danger); display:none;"></p>
      </div>
      <div id="messages"></div>
      <div id="typingIndicator" class="typing-indicator">상대방이 입력 중...</div>
      <div class="input-bar" id="inputBar">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="파일">📎</button>
        <textarea id="msgInput" rows="1" placeholder="메시지 (종단간 암호화)" autocomplete="off"></textarea>
        <button class="send-btn" onclick="app.sendText()">➤</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="app.handleFiles(this.files)">
    </div>
  </div>
</div>

<script>
// ================================================================
//  궁극의 P2P 암호 채팅 - SecureChat 클래스
// ================================================================
class SecureChat {
  constructor() {
    this.pc = null; this.dc = null; this.isOfferer = false; this.password = null;
    this.authKey = null; this.sessionKey = null; this.sendChain = null; this.recvChain = null;
    this.ourEcdhPair = null; this.peerEcdhPub = null; this.salt = null;
    this.handshakeDone = false; this.fileReceive = null; this.typingChannel = null;
    this.pendingOutbox = []; this.receivedMessageIds = new Set();
    this.ECDH = { name: 'ECDH', namedCurve: 'P-256' };
    this.PBKDF2_ITERS = 600000;
    this.ICE_SERVERS = ['stun:stun.services.mozilla.com:3478','stun:stun.nextcloud.com:443'].map(u=>({urls:u}));
    this.DESTROY_KEY = 'p2p_chat_destroyed';
    this.securityMgr = new SecurityManager(this);
    this.init();
  }

  // ---------- UI 헬퍼 ----------
  showScreen(id) { 
    document.querySelectorAll('#simpleMode, #chatScreen').forEach(el => el.style.display = 'none');
    (document.getElementById(id) || document.getElementById('simpleMode')).style.display = (id==='chatScreen'?'flex':'block');
  }
  updateConn(ok) { 
    document.getElementById('connDot').className = 'dot ' + (ok ? 'on' : 'off'); 
    document.getElementById('connLabel').textContent = ok ? '연결됨' : '오프라인'; 
  }
  addMsg(text, who, msgId) {
    if (localStorage.getItem(this.DESTROY_KEY)) return;
    const c = document.getElementById('messages'), d = document.createElement('div');
    d.className = 'msg ' + (who==='me'?'me':who==='other'?'other':'system');
    if (msgId) d.id = 'msg-' + msgId;
    let bubble = this.escapeHtml(text);
    let timeHtml = `<div class="time">${new Date().toLocaleTimeString()}`;
    if (who==='me' && msgId) timeHtml += ` <button class="btn-small" style="background:none;color:var(--danger);padding:2px 6px;" onclick="app.deleteMessage('${msgId}')">✕</button>`;
    timeHtml += `</div>`;
    if (this.fileReceive && text.startsWith('📥')) bubble += `<div class="progress"><div class="progress-bar" id="file-progress"></div></div>`;
    d.innerHTML = `<div class="bubble" data-sensitive="true">${bubble}${timeHtml}</div>`;
    c.appendChild(d); c.scrollTop = c.scrollHeight;
    this.securityMgr.applyBlurToNode(d.querySelector('.bubble'));
  }
  copyTextById(id) { 
    const el = document.getElementById(id); 
    const text = el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' ? el.value : el.textContent; 
    navigator.clipboard.writeText(text).then(() => alert('복사됨')).catch(() => prompt('Ctrl+C로 복사하세요', text)); 
  }
  escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

  // ---------- WebRTC ----------
  initPC() { 
    this.pc = new RTCPeerConnection({iceServers: this.ICE_SERVERS}); 
    this.pc.oniceconnectionstatechange = () => this.onIceState(); 
    this.pc.ondatachannel = (e) => {
      if (e.channel.label === 'chat') { if (this.dc) this.dc.close(); this.dc = e.channel; this.setupDC(); }
      else if (e.channel.label === 'typing') { if (this.typingChannel) this.typingChannel.close(); this.typingChannel = e.channel; this.setupTypingChannel(); }
    };
  }
  createDataChannels() {
    if (!this.pc || !this.isOfferer) return;
    if (this.dc) this.dc.close(); if (this.typingChannel) this.typingChannel.close();
    this.dc = this.pc.createDataChannel('chat', { ordered: true });
    this.typingChannel = this.pc.createDataChannel('typing', { ordered: false, maxRetransmits: 0 });
    this.setupDC(); this.setupTypingChannel();
  }
  setupDC() {
    if (!this.dc) return;
    this.dc.onopen = () => { this.updateConn(true); this.showScreen('chatScreen'); this.flushOutbox(); if (!this.handshakeDone && !this.sessionKey) this.startEcdhExchange(); };
    this.dc.onmessage = (e) => this.onMsg(e);
    this.dc.onclose = () => this.updateConn(false);
  }
  setupTypingChannel() {
    if (!this.typingChannel) return;
    this.typingChannel.onmessage = (e) => { if (typeof e.data === 'string') document.getElementById('typingIndicator').style.display = e.data === '1' ? 'block' : 'none'; };
  }
  onIceState() {
    const s = this.pc.iceConnectionState;
    if (s === 'connected' || s === 'completed') { this.updateConn(true); if ((!this.dc || this.dc.readyState !== 'open') && this.isOfferer) this.createDataChannels(); }
    else if (s === 'disconnected') { this.updateConn(false); this.pc.restartIce(); }
    else if (s === 'failed' || s === 'closed') { this.updateConn(false); this.closeConnection(); this.showScreen('simpleMode'); }
  }
  waitIce() { return new Promise(r => { if (this.pc.iceGatheringState === 'complete') r(); else this.pc.addEventListener('icegatheringstatechange', () => { if (this.pc.iceGatheringState === 'complete') r(); }); }); }

  // ---------- 액션 ----------
  startNewChat() {
    localStorage.removeItem(this.DESTROY_KEY); this.closeConnection(); this.isOfferer = true;
    document.getElementById('offerPanel').classList.remove('hidden');
    document.getElementById('answerPanel').classList.add('hidden');
    document.getElementById('offerSpinner').style.display = 'inline-block';
    this.initPC(); this.createDataChannels();
    this.pc.createOffer().then(o => this.pc.setLocalDescription(o)).then(() => this.waitIce().then(() => {
      document.getElementById('offerSpinner').style.display = 'none';
      const offerB64 = btoa(JSON.stringify(this.pc.localDescription));
      document.getElementById('offerLinkDisplay').textContent = location.origin + location.pathname + '#offer=' + offerB64;
    }));
  }
  showJoinPanel() {
    document.getElementById('offerPanel').classList.add('hidden');
    document.getElementById('answerPanel').classList.remove('hidden');
    document.getElementById('autoAnswerContent').classList.add('hidden');
    document.getElementById('manualJoinContent').classList.remove('hidden');
  }
  async initiateAnswer(offer) {
    this.isOfferer = false; this.initPC();
    await this.pc.setRemoteDescription(offer);
    const ans = await this.pc.createAnswer(); await this.pc.setLocalDescription(ans); await this.waitIce();
    document.getElementById('answerSpinner').style.display = 'none';
    document.getElementById('answerReadyPanel').classList.remove('hidden');
    document.getElementById('answerLinkDisplay').textContent = location.origin + location.pathname + '#answer=' + btoa(JSON.stringify(this.pc.localDescription));
  }
  async createAnswerFromOffer() {
    const t = document.getElementById('remoteOfferSDP').value.trim(); if (!t) return;
    this.closeConnection(); this.isOfferer = false; this.initPC();
    const u = new URL(t); const hp = new URLSearchParams(u.hash.substring(1));
    if (!hp.has('offer')) { alert('올바른 초대 링크가 아닙니다.'); return; }
    await this.pc.setRemoteDescription(JSON.parse(atob(hp.get('offer'))));
    const ans = await this.pc.createAnswer(); await this.pc.setLocalDescription(ans); await this.waitIce();
    document.getElementById('localAnswerLinkDisplay').textContent = location.origin + location.pathname + '#answer=' + btoa(JSON.stringify(this.pc.localDescription));
    document.getElementById('answerResultPanel').classList.remove('hidden');
  }
  async applyAnswerLink() {
    const l = document.getElementById('answerLinkInput').value.trim(); if (!l) return;
    try {
      const u = new URL(l); const hp = new URLSearchParams(u.hash.substring(1));
      if (hp.has('answer')) { await this.pc.setRemoteDescription(JSON.parse(atob(hp.get('answer')))); }
    } catch (e) { alert('올바르지 않은 Answer 링크입니다.'); }
  }

  // ---------- 암호화 코어 ----------
  async startEcdhExchange() {
    try {
      const keyPair = await crypto.subtle.generateKey(this.ECDH, true, ['deriveKey','deriveBits']);
      this.ourEcdhPair = { privateKey: keyPair.privateKey, publicKey: keyPair.publicKey };
      const pubRaw = await crypto.subtle.exportKey('raw', this.ourEcdhPair.publicKey);
      if (this.isOfferer) {
        this.salt = crypto.getRandomValues(new Uint8Array(32));
        this.dc.send(JSON.stringify({type:'__ecdhe__', salt: this.buf2b64(this.salt.buffer), pubKey: this.buf2b64(pubRaw)}));
      } else {
        this.dc.send(JSON.stringify({type:'__ecdhe__', pubKey: this.buf2b64(pubRaw)}));
      }
    } catch (e) { this.addMsg('보안 오류', 'system'); }
  }
  async handleEcdheMessage(data) {
    if (this.handshakeDone) return;
    try {
      if (data.salt) this.salt = new Uint8Array(this.b642buf(data.salt));
      this.peerEcdhPub = await crypto.subtle.importKey('raw', this.b642buf(data.pubKey), this.ECDH, true, []);
      if (this.password && this.ourEcdhPair && this.peerEcdhPub && this.salt) await this.deriveSessionKey();
    } catch (e) { this.addMsg('키 교환 실패', 'system'); }
  }
  async submitPassword() {
    const errorEl = document.getElementById('passwordError');
    errorEl.style.display = 'none'; this.password = document.getElementById('chatPasswordInput').value.trim();
    if (!this.password) { errorEl.textContent = '암호를 입력하세요.'; errorEl.style.display = 'block'; return; }
    if (!this.salt || !this.ourEcdhPair || !this.peerEcdhPub) { errorEl.textContent = '상대방과의 보안 연결 준비 중...'; errorEl.style.display = 'block'; return; }
    if (this.handshakeDone) return;
    try {
      await this.deriveAuthKey(); await this.deriveSessionKey(); this.handshakeDone = true;
      document.getElementById('passwordPrompt').style.display = 'none';
      document.getElementById('securityCard').style.display = 'flex';
      this.addMsg('🔐 세션 활성화', 'system');
    } catch (e) { errorEl.textContent = '세션 키 실패: ' + e.message; errorEl.style.display = 'block'; }
  }
  async deriveAuthKey() {
    const km = await crypto.subtle.importKey('raw', this.str2buf(this.password), 'PBKDF2', false, ['deriveKey']);
    this.authKey = await crypto.subtle.deriveKey({ name:'PBKDF2', salt: this.salt, iterations: this.PBKDF2_ITERS, hash:'SHA-512' }, km, { name:'AES-GCM', length:256 }, true, ['encrypt','decrypt']);
  }
  async deriveSessionKey() {
    const ecdhBits = await crypto.subtle.deriveBits({ name:'ECDH', public: this.peerEcdhPub }, this.ourEcdhPair.privateKey, 256);
    const authRaw = await crypto.subtle.exportKey('raw', this.authKey);
    const ikm = this.concatBufs(ecdhBits, this.str2buf(this.password));
    const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveKey']);
    this.sessionKey = await crypto.subtle.deriveKey({ name:'HKDF', hash:'SHA-512', salt: authRaw, info: this.str2buf('session') }, hkdfKey, { name:'AES-GCM', length:256 }, true, ['encrypt','decrypt']);
    const sb = await crypto.subtle.exportKey('raw', this.sessionKey);
    const chainA = await this.hkdfExpand(sb, this.str2buf('chain-a'));
    const chainB = await this.hkdfExpand(sb, this.str2buf('chain-b'));
    const ourPub = await crypto.subtle.exportKey('raw', this.ourEcdhPair.publicKey);
    const peerPub = await crypto.subtle.exportKey('raw', this.peerEcdhPub);
    const weAreSmaller = this.compareBuffers(new Uint8Array(ourPub), new Uint8Array(peerPub)) < 0;
    this.sendChain = weAreSmaller ? { chain: chainA, seq:0 } : { chain: chainB, seq:0 };
    this.recvChain = weAreSmaller ? { chain: chainB, seq:-1 } : { chain: chainA, seq:-1 };
    document.getElementById('sessionFingerprint').textContent = this.buf2hex(await crypto.subtle.digest('SHA-256', sb)).slice(0,32);
  }

  // ---------- 유틸 (암호화 관련) ----------
  buf2hex(b) { return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
  str2buf(s) { return new TextEncoder().encode(s); }
  buf2b64(b) { return btoa(String.fromCharCode(...new Uint8Array(b))); }
  b642buf(s) { return Uint8Array.from(atob(s), c=>c.charCodeAt(0)).buffer; }
  concatBufs(...bufs) { let len=bufs.reduce((a,b)=>a+b.byteLength,0), tmp=new Uint8Array(len), off=0; bufs.forEach(b=>{tmp.set(new Uint8Array(b),off);off+=b.byteLength;}); return tmp.buffer; }
  compareBuffers(b1,b2) { for(let i=0; i<b1.byteLength; i++){ if(b1[i]<b2[i]) return -1; if(b1[i]>b2[i]) return 1; } return 0; }
  async hkdfExpand(prk, info) {
    const k = await crypto.subtle.importKey('raw', prk, { name:'HMAC', hash:'SHA-256' }, false, ['sign']);
    const s = await crypto.subtle.sign('HMAC', k, info);
    return crypto.subtle.importKey('raw', s.slice(0,32), { name:'HMAC', hash:'SHA-256' }, false, ['sign']);
  }
  async ratchetForward(chainRef) {
    const cur = chainRef.chain;
    const newChain = await crypto.subtle.sign('HMAC', cur, new Uint8Array([2]));
    chainRef.chain = await crypto.subtle.importKey('raw', newChain.slice(0,32), { name:'HMAC', hash:'SHA-256' }, false, ['sign']);
    const msgKey = await crypto.subtle.sign('HMAC', cur, new Uint8Array([1]));
    return crypto.subtle.importKey('raw', msgKey.slice(0,32), { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
  }
  async encryptPayload(obj) {
    if (!this.sendChain) throw new Error('세션키 없음');
    const mk = await this.ratchetForward(this.sendChain);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, mk, this.str2buf(JSON.stringify(obj)));
    return { seq: this.sendChain.seq++, iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
  }
  async decryptPayload(d) {
    if (!this.recvChain) throw new Error('세션키 없음');
    const { seq, iv, ct } = d;
    const prevChain = this.recvChain.chain, prevSeq = this.recvChain.seq;
    try {
      if (seq <= this.recvChain.seq) throw new Error('Invalid seq');
      while (this.recvChain.seq < seq-1) { await this.ratchetForward(this.recvChain); this.recvChain.seq++; }
      const mk = await this.ratchetForward(this.recvChain);
      this.recvChain.seq = seq;
      const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv: new Uint8Array(iv) }, mk, new Uint8Array(ct));
      return JSON.parse(new TextDecoder().decode(plain));
    } catch (e) { this.recvChain.chain = prevChain; this.recvChain.seq = prevSeq; throw e; }
  }

  // ---------- 메시징 ----------
  async sendText() {
    const inp = document.getElementById('msgInput'); const txt = inp.value.trim(); if (!txt) return;
    const msgId = crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g,c=>{const r=crypto.getRandomValues(new Uint8Array(1))[0]%16;return(c=='x'?r:r&0x3|0x8).toString(16);});
    const payload = { type:'text', content: txt, id: msgId };
    if (!this.dc || this.dc.readyState !== 'open' || !this.sessionKey) {
      if (this.sessionKey) { this.pendingOutbox.push({ payload, id: msgId }); this.addMsg(txt, 'me', msgId); this.addMsg('⏳ 오프라인 - 복구 시 전송', 'system'); }
      else this.addMsg('⚠️ 암호를 설정하세요.', 'system');
      inp.value = ''; return;
    }
    try {
      const enc = await this.encryptPayload(payload);
      this.dc.send(JSON.stringify({ type:'msg', ...enc }));
      this.addMsg(txt, 'me', msgId);
    } catch (e) { this.pendingOutbox.push({ payload, id: msgId }); this.addMsg(txt, 'me', msgId); this.addMsg('⚠️ 전송 실패 - 대기열 저장', 'system'); }
    inp.value = '';
  }
  onMsg(e) {
    if (e.data instanceof ArrayBuffer) { this.handleBinaryChunk(e.data); return; }
    try {
      const d = JSON.parse(e.data);
      if (d.type === '__ecdhe__') { this.handleEcdheMessage(d); return; }
      if (d.type === 'msg') {
        if (!this.sessionKey) { this.addEncryptedMessage(d); return; }
        this.decryptPayload(d).then(inner => {
          if (inner.id && this.receivedMessageIds.has(inner.id)) return;
          if (inner.id) this.receivedMessageIds.add(inner.id);
          if (inner.type === 'text') { this.addMsg(inner.content, 'other', inner.id); this.sendReadReceipt(inner.id); }
          else if (inner.type === 'read') this.markAsRead(inner.id);
          else if (inner.type === 'delete') document.getElementById('msg-' + inner.id)?.remove();
          else if (inner.type === 'file_start') this.handleFileStart(inner);
          else if (inner.type === 'file_end') { if (this.fileReceive && this.fileReceive.id === inner.id) this.assembleFile(); }
          else if (inner.type === '__destroy__') { localStorage.setItem(this.DESTROY_KEY, Date.now()); this.executeDestroy(); }
        }).catch(() => this.addEncryptedMessage(d));
      }
    } catch (e) {}
  }
  async flushOutbox() {
    if (!this.dc || this.dc.readyState !== 'open' || this.pendingOutbox.length === 0) return;
    const toSend = [...this.pendingOutbox]; this.pendingOutbox = [];
    for (const msg of toSend) {
      try { const enc = await this.encryptPayload(msg.payload); this.dc.send(JSON.stringify({ type:'msg', ...enc })); } catch(e) {}
    }
    this.addMsg('📬 대기 메시지 전송 완료', 'system');
  }
  addEncryptedMessage(rawData) {
    if (localStorage.getItem(this.DESTROY_KEY)) return;
    const c = document.getElementById('messages'), d = document.createElement('div');
    d.className = 'msg system';
    d.innerHTML = `<div class="encrypted-bubble" data-sensitive="true"><strong>🔒 암호화된 메시지</strong><br>${this.escapeHtml(JSON.stringify(rawData, null, 2))}</div>`;
    c.appendChild(d); c.scrollTop = c.scrollHeight;
    this.securityMgr.applyBlurToNode(d.querySelector('.encrypted-bubble'));
  }
  async sendReadReceipt(msgId) { if (!this.sessionKey) return; try { const enc = await this.encryptPayload({ type:'read', id: msgId }); this.dc.send(JSON.stringify({ type:'msg', ...enc })); } catch (e) {} }
  async deleteMessage(msgId) {
    if (!this.sessionKey) return;
    try { const enc = await this.encryptPayload({ type:'delete', id: msgId }); this.dc.send(JSON.stringify({ type:'msg', ...enc })); document.getElementById('msg-' + msgId)?.remove(); } catch (e) {}
  }

  // ---------- 파일 처리 ----------
  handleFileStart(inner) { this.fileReceive = { id: inner.id, name: inner.name, size: inner.size, fek: this.b642buf(inner.fek), chunks:[], received:0 }; this.addMsg(`📥 ${inner.name} (${this.formatBytes(inner.size)})`, 'other'); }
  handleBinaryChunk(buf) {
    if (!this.fileReceive) return;
    this.fileReceive.chunks.push(new Uint8Array(buf));
    this.fileReceive.received += buf.byteLength;
    const pb = document.getElementById('file-progress');
    if (pb) pb.style.width = Math.round(this.fileReceive.received / this.fileReceive.size * 100)+'%';
    if (this.fileReceive.received >= this.fileReceive.size) document.getElementById('file-progress')?.parentElement?.remove();
  }
  async assembleFile() {
    if (!this.fileReceive) return;
    const combined = new Uint8Array(this.fileReceive.size);
    let off = 0; for(const c of this.fileReceive.chunks) { combined.set(c, off); off += c.length; }
    const iv = combined.slice(0,12), ct = combined.slice(12);
    const key = await crypto.subtle.importKey('raw', this.fileReceive.fek, 'AES-GCM', false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
    const blob = new Blob([plain]), url = URL.createObjectURL(blob);
    const c = document.getElementById('messages'), d = document.createElement('div'); d.className = 'msg other';
    let html = `<div class="bubble"><div class="file-bubble"><span>📎 ${this.escapeHtml(this.fileReceive.name)}</span>`;
    if(blob.type.startsWith('image/')) html += `<div class="file-preview"><img src="${url}"></div>`;
    else if(blob.type.startsWith('video/')) html += `<div class="file-preview"><video controls src="${url}"></video></div>`;
    html += `<a href="${url}" download="${this.escapeHtml(this.fileReceive.name)}" style="color:var(--accent);">다운로드</a></div><div class="time">${new Date().toLocaleTimeString()}</div></div>`;
    d.innerHTML = html; c.appendChild(d); c.scrollTop = c.scrollHeight; this.fileReceive = null;
  }
  async handleFiles(files) { for(const f of files) await this.sendFile(f); }
  async sendFile(file) {
    if(!this.dc || this.dc.readyState !== 'open' || !this.sessionKey) return;
    const fileId = crypto.randomUUID(); const fek = await crypto.subtle.generateKey({ name:'AES-GCM', length:256 }, true, ['encrypt']);
    const iv = crypto.getRandomValues(new Uint8Array(12)), fekRaw = await crypto.subtle.exportKey('raw', fek);
    const fileBuf = await file.arrayBuffer();
    const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, fek, fileBuf);
    const encData = new Uint8Array(iv.byteLength + ct.byteLength); encData.set(iv); encData.set(new Uint8Array(ct), iv.byteLength);
    const metaEnc = await this.encryptPayload({ type:'file_start', id: fileId, name: file.name, size: encData.byteLength, fek: this.buf2b64(fekRaw) });
    this.dc.send(JSON.stringify({ type:'msg', ...metaEnc }));
    const chunkSize = 64*1024; let offset = 0;
    while(offset < encData.byteLength){
      const end = Math.min(offset + chunkSize, encData.byteLength);
      this.dc.send(encData.slice(offset, end).buffer); offset = end; await new Promise(r => setTimeout(r, 10));
    }
    const endEnc = await this.encryptPayload({ type:'file_end', id: fileId });
    this.dc.send(JSON.stringify({ type:'msg', ...endEnc }));
    this.addMsg(`📤 ${file.name} 전송 완료`, 'me');
  }
  formatBytes(b) { return b<1024 ? b+' B' : b<1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }

  // ---------- 파괴 ----------
  async destroyChat() {
    if (!this.sessionKey || !this.dc || this.dc.readyState !== 'open') { localStorage.setItem(this.DESTROY_KEY, Date.now()); this.executeDestroy(); return; }
    if (!confirm('⚠️ 상대방과 나의 모든 대화 기록을 영구 삭제합니다.\n복구는 절대 불가능합니다. 계속하시겠습니까?')) return;
    try { const enc = await this.encryptPayload({ type:'__destroy__', timestamp: Date.now() }); this.dc.send(JSON.stringify({ type:'msg', ...enc })); } catch(e) {}
    localStorage.setItem(this.DESTROY_KEY, Date.now());
    this.executeDestroy();
  }
  executeDestroy() {
    document.getElementById('messages').innerHTML = ''; this.receivedMessageIds.clear(); this.pendingOutbox = [];
    this.addMsg('💥 대화가 완전히 삭제되었습니다.', 'system');
    setTimeout(() => { this.closeConnection(); this.showScreen('simpleMode'); }, 500);
  }

  // ---------- 정리 ----------
  closeConnection() {
    if (this.pc) { this.pc.close(); this.pc = null; } this.dc = null; this.typingChannel = null;
    this.authKey = this.sessionKey = null; this.sendChain = this.recvChain = null;
    this.salt = null; this.ourEcdhPair = null; this.peerEcdhPub = null; this.fileReceive = null; this.password = null;
    this.handshakeDone = false; this.receivedMessageIds.clear(); this.pendingOutbox = [];
    document.getElementById('sessionFingerprint').textContent = '';
    document.getElementById('securityCard').style.display = 'none';
    document.getElementById('passwordPrompt').style.display = 'block';
    document.getElementById('passwordError').style.display = 'none';
  }

  // ---------- 보안 위반 콜백 ----------
  onSecurityViolation() {
    this.securityMgr.strengthenBlur();
  }

  // ---------- 초기화 ----------
  init() {
    if (localStorage.getItem(this.DESTROY_KEY)) this.showScreen('simpleMode');
    document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendText(); } });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', async e => { e.preventDefault(); if (e.dataTransfer.files.length) this.handleFiles(e.dataTransfer.files); });
    this.checkHash(); window.addEventListener('hashchange', () => this.checkHash());
  }
  async checkHash() {
    const h = location.hash.substring(1); if (!h) return; if (localStorage.getItem(this.DESTROY_KEY)) return;
    const p = new URLSearchParams(h);
    if (p.has('offer')) {
      try {
        const offer = JSON.parse(atob(p.get('offer'))); this.closeConnection();
        document.querySelector('#simpleMode .card').classList.add('hidden');
        document.getElementById('answerPanel').classList.remove('hidden');
        document.getElementById('autoAnswerContent').classList.remove('hidden');
        document.getElementById('manualJoinContent').classList.add('hidden');
        document.getElementById('answerSpinner').style.display = 'inline-block';
        document.getElementById('answerReadyPanel').classList.add('hidden');
        await this.initiateAnswer(offer);
      } catch (e) { alert('잘못된 초대 링크입니다.'); }
    } else if (p.has('answer')) {
      try {
        const answer = JSON.parse(atob(p.get('answer')));
        if (this.pc && this.isOfferer) await this.pc.setRemoteDescription(answer);
        else alert('채팅을 먼저 시작한 후 Answer 링크를 적용하세요.');
      } catch (e) { alert('잘못된 Answer 링크입니다.'); }
    }
  }
}

// ================================================================
//  SecurityManager – 모든 보안 레이어 통합
// ================================================================
class SecurityManager {
  constructor(chatApp) {
    this.chat = chatApp;
    this.violations = 0;
    this.isStrengthened = false;
    this.revealCooldown = 1500;
    this.currentCooldown = this.revealCooldown;
    this.blurAmount = 8;
    this.init();
  }

  logViolation(reason) {
    this.violations++;
    console.warn('SECURITY:', reason, '(' + this.violations + ')');
    if (!this.isStrengthened) this.strengthenBlur();
    else {
      this.currentCooldown = 10000;
      this.applyStrongBlurToAll();
    }
    if (this.chat && this.chat.onSecurityViolation) this.chat.onSecurityViolation();
  }

  strengthenBlur() {
    this.isStrengthened = true;
    this.blurAmount = 20;
    this.currentCooldown = 10000;
    document.querySelectorAll('.bubble, .encrypted-bubble, .fingerprint, #passwordPrompt, .link-box').forEach(el => el.style.filter = 'blur(20px)');
    clearTimeout(this.strengthenTimer);
    this.strengthenTimer = setTimeout(() => {
      this.isStrengthened = false;
      this.blurAmount = 8;
      this.currentCooldown = this.revealCooldown;
      document.querySelectorAll('.bubble, .encrypted-bubble, .fingerprint, #passwordPrompt, .link-box').forEach(el => { if(!el.classList.contains('shield-strong')) el.style.filter = 'blur(8px)'; });
    }, 15000);
  }

  applyStrongBlurToAll() {
    document.querySelectorAll('.bubble, .encrypted-bubble, .fingerprint, #passwordPrompt, .link-box').forEach(el => { el.classList.add('shield-strong'); el.style.filter = 'blur(20px)'; });
  }

  applyBlurToNode(node) {
    if (!node) return;
    if (node.matches('.bubble, .encrypted-bubble')) {
      node.style.filter = `blur(${this.blurAmount}px)`;
      node.addEventListener('mousedown', this.revealHandler.bind(this));
      node.addEventListener('touchstart', this.revealHandler.bind(this), { passive: true });
    }
  }

  revealHandler(e) {
    const target = e.currentTarget;
    if (target.classList.contains('shield-strong') || this.isStrengthened) return;

    target.classList.add('revealed');
    target.style.filter = 'blur(0px)';
    clearTimeout(target._revealTimer);
    target._revealTimer = setTimeout(() => {
      target.classList.remove('revealed');
      target.style.filter = `blur(${this.blurAmount}px)`;
    }, this.currentCooldown);
  }

  // ---------- 이벤트 바인딩 ----------
  init() {
    const ua = navigator.userAgent || '';
    const isWin = /Windows/i.test(ua);
    const isMac = /Macintosh/i.test(ua);
    const isLinux = /Linux/i.test(ua) && !/Android/i.test(ua);

    window.addEventListener('beforeprint', e => { e.preventDefault(); this.logViolation('인쇄'); });
    document.addEventListener('keydown', e => {
      let block = false; const k = e.key.toLowerCase();
      if (k === 'f12' || k === 'printscreen') block = true;
      if ((e.ctrlKey||e.metaKey) && (k==='s'||k==='p'||k==='u')) block = true;
      if ((e.ctrlKey||e.metaKey) && e.shiftKey && (k==='i'||k==='c'||k==='j')) block = true;
      if (isWin && (k==='meta'||k==='win')) block = true;
      if (isMac && e.metaKey && e.shiftKey && (k==='3'||k==='4'||k==='5')) block = true;
      if (isLinux && k==='printscreen') block = true;
      if (block) { e.preventDefault(); e.stopPropagation(); this.logViolation('키: '+k); }
    }, true);
    document.addEventListener('contextmenu', e => { e.preventDefault(); this.logViolation('우클릭'); });
    document.addEventListener('dragstart', e => { e.preventDefault(); this.logViolation('드래그'); });
    document.addEventListener('selectstart', e => { if (!e.target.matches('input, textarea')) { e.preventDefault(); this.logViolation('텍스트 선택'); } });
    document.addEventListener('copy', e => { if (!e.target.matches('input, textarea')) { e.preventDefault(); this.logViolation('복사'); } });
    document.addEventListener('cut', e => { if (!e.target.matches('input, textarea')) { e.preventDefault(); this.logViolation('잘라내기'); } });
    document.addEventListener('paste', e => { if (!e.target.matches('input, textarea')) { e.preventDefault(); this.logViolation('붙여넣기'); } });
    window.addEventListener('blur', () => this.logViolation('포커스 상실'));
    window.addEventListener('resize', () => this.logViolation('화면 크기'));
    document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement) this.logViolation('전체화면 해제'); });
    setInterval(() => {
      const s = performance.now(); debugger; if (performance.now()-s > 100) this.logViolation('DevTools');
      if (outerWidth-innerWidth > 150 || outerHeight-innerHeight > 150) this.logViolation('DevTools 크기');
    }, 3000);
    new MutationObserver(m => { for(const r of m) for(const n of r.addedNodes) if(n.nodeType===1) { n.remove(); this.logViolation('DOM'); } }).observe(document.body, {childList:true, subtree:true, attributes:true});
    if (navigator.mediaDevices) { navigator.mediaDevices.getUserMedia = () => Promise.reject(new Error('Blocked')); if (navigator.mediaDevices.getDisplayMedia) navigator.mediaDevices.getDisplayMedia = () => Promise.reject(new Error('Blocked')); }
    navigator.clipboard.write = () => Promise.reject('Blocked');
    window.open = () => { this.logViolation('window.open'); return null; };
    document.execCommand = () => false;
    window.addEventListener('beforeunload', e => { e.preventDefault(); e.returnValue = ''; });
    document.documentElement.style.overscrollBehavior = 'none';
  }
}
