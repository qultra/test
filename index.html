      -webkit-user-modify: read-only;

    body {

    .container {

      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    #antiScreenshotCanvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index: 9998; pointer-events: none; opacity: 0.03;
      mix-blend-mode: difference;
    }
    /* 블러 대상 */
    .blur-target {
      filter: blur(12px) !important;
      transition: filter 0.2s ease;
      cursor: pointer;
    }
    .blur-target.revealed { filter: blur(0) !important; }
    .blur-target.locked {
      filter: blur(20px) !important; cursor: not-allowed; pointer-events: auto;
    }
    .blur-target.locked::after {
      content: "🔒 오프라인 잠금";
      position: absolute; inset:0; display:flex; align-items:center; justify-content:center;
      background: rgba(255,0,0,0.5); color: #fff; font-size:0.75rem; font-weight:bold;
      pointer-events: none; z-index:10; border-radius: inherit;
    }

    .header { padding:14px 20px; background:rgba(8,14,24,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }

    .dot.off { background:var(--danger); }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); padding:12px 20px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:0.9rem; transition:0.2s; width:100%; backdrop-filter:blur(10px); }
    .btn:hover { background:rgba(255,255,255,0.12); transform:translateY(-1px); }
    .btn:active { transform:scale(0.97); }
    .btn.primary { background:var(--accent); border:none; }
    .btn.danger { background:var(--danger); border:none; }
    .btn-small { padding:7px 12px; font-size:0.8rem; width:auto; }

    input:focus, textarea:focus { border-color:var(--accent); }

    .msg.system { align-items:center; } .msg.me { align-items:flex-end; } .msg.other { align-items:flex-start; }
    .bubble { max-width:83%; padding:10px 16px; border-radius:20px; background:rgba(22,30,44,0.85); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); word-break:break-word; position:relative; overflow:hidden; z-index:1; }

// ==================== 블러 관리 – 오프라인 잠금 추가 ====================
function applyBlurToSensitiveElements() {
  document.querySelectorAll('.bubble').forEach(el => {
    if (!el.classList.contains('blur-target') && !el.closest('#msgInput') && !el.closest('.input-bar')) {
      el.classList.add('blur-target');
    }
  });
  document.querySelectorAll('.fingerprint, .link-box, .encrypted-bubble').forEach(el => {
    if (!el.classList.contains('blur-target')) el.classList.add('blur-target');
  });
}

// 온라인 상태 확인: 연결됨 + 세션키 있음
function isOnline() {
  return dc && dc.readyState === 'open' && sessionKey;
}

// 온라인일 때만 블러 해제 가능 (짧은 터치로 2.5초)
document.addEventListener('click', e => {
  const target = e.target.closest('.blur-target');
  if (target && !target.classList.contains('locked') && isOnline()) {
    target.classList.add('revealed');
    setTimeout(() => target.classList.remove('revealed'), 2500);
  }
});

// 오프라인 상태 변화 감시 → 오프라인이면 모든 블러 강제 잠금
function updateOfflineLock() {
  if (isOnline()) {
    // 온라인 복귀: locked 해제
    document.querySelectorAll('.blur-target.locked').forEach(el => {
      el.classList.remove('locked');
    });
  } else {
    // 오프라인: 모든 블러 locked
    document.querySelectorAll('.blur-target').forEach(el => {
      el.classList.add('locked');
      el.classList.remove('revealed');
    });
  }
}

// 보안 잠금 (위반 시)
let securityLockLevel = 0;
let globalBlurTimer = null;
function lockAllBlurs(duration = 10000) {
  document.querySelectorAll('.blur-target').forEach(el => { el.classList.add('locked'); el.classList.remove('revealed'); });
  clearTimeout(globalBlurTimer);
  globalBlurTimer = setTimeout(() => {
    if (isOnline()) document.querySelectorAll('.blur-target.locked').forEach(el => el.classList.remove('locked'));
  }, duration);
}
function triggerSecurityLock(level = 1) {
  securityLockLevel = Math.max(securityLockLevel, level);
  if (securityLockLevel >= 2) lockAllBlurs(15000);
  else if (securityLockLevel >= 1) lockAllBlurs(5000);
  setTimeout(() => { securityLockLevel = Math.max(0, securityLockLevel - 1); }, 30000);
}

function initPC(){
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  pc.oniceconnectionstatechange = onIceState;
  pc.ondatachannel = e => {
    if (isDestroyed()) return;
    if(e.channel.label === 'chat'){ if(dc) dc.close(); dc = e.channel; setupDC(); if(handshakeDone && sessionKey) flushOutbox(); if (isDestroyed()) { executeDestroy(); return; } }
    else if(e.channel.label === TYPING_LABEL){ if(typingChannel) typingChannel.close(); typingChannel = e.channel; }
  };
}

function createDataChannels(){
  if(!pc || !isOfferer) return;
  if(dc) dc.close(); if(typingChannel) typingChannel.close();
  dc = pc.createDataChannel('chat', { ordered: true });
  typingChannel = pc.createDataChannel(TYPING_LABEL, { ordered: false, maxRetransmits: 0 });
  setupDC();
}

function setupDC(){
  if(!dc) return;
  dc.onopen = () => {
    if (isDestroyed()) { executeDestroy(); return; }
    updateConn(true); showChat(); flushOutbox();
    if (isDestroyed()) { executeDestroy(); return; }
    if(!handshakeDone && !sessionKey) startEcdhExchange();
    updateOfflineLock(); // 온라인 상태 감지 → 블러 잠금 해제
  };
  dc.onmessage = onMsg;
  dc.onclose = () => { updateConn(false); updateOfflineLock(); };
}

function onIceState(){
  const s = pc.iceConnectionState;
  if(s==='connected'||s==='completed'){ updateConn(true); if((!dc||dc.readyState!=='open')&&isOfferer) createDataChannels(); if(isDestroyed()) executeDestroy(); updateOfflineLock(); }
  else if(s==='disconnected'){ updateConn(false); updateOfflineLock(); pc.restartIce(); }
  else if(s==='failed'||s==='closed'){ updateConn(false); updateOfflineLock(); }
}

function waitIce(){ return new Promise(r=>{if(pc.iceGatheringState==='complete')r();else pc.addEventListener('icegatheringstatechange',()=>{if(pc.iceGatheringState==='complete')r();});}); }
function updateConn(ok){ document.getElementById('connDot').className='dot '+(ok?'on':'off'); document.getElementById('connLabel').textContent=ok?'연결됨':'오프라인'; }
function checkDestroyAndPropagate(){ if(isDestroyed()) executeDestroy(); }

async function flushOutbox(){
  if(isDestroyed()) return;
  if(!dc||dc.readyState!=='open'||pendingOutbox.length===0) return;
  const toSend=[...pendingOutbox]; pendingOutbox=[];
  for(const msg of toSend){ try{ const enc=await encryptPayload(msg.payload); dc.send(JSON.stringify({type:'msg',...enc})); }catch(e){} }
  addMsg('📬 대기 메시지 전송 완료','system');
}

async function startEcdhExchange(){
  try{
    const keyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
    ourEcdhPair = { privateKey:keyPair.privateKey, publicKey:keyPair.publicKey };
    const pubRaw = await crypto.subtle.exportKey('raw', ourEcdhPair.publicKey);
    if(isOfferer){ salt=crypto.getRandomValues(new Uint8Array(SALT_SIZE)); dc.send(JSON.stringify({type:'__ecdhe__',salt:buf2b64(salt.buffer),pubKey:buf2b64(pubRaw)})); }
    else { dc.send(JSON.stringify({type:'__ecdhe__',pubKey:buf2b64(pubRaw)})); }
  }catch(e){ addMsg('보안 오류','system'); }
}

async function handleEcdheMessage(data){
  if(handshakeDone||isDestroyed()) return;
  try{ if(data.salt) salt=new Uint8Array(b642buf(data.salt)); peerEcdhPub=await crypto.subtle.importKey('raw',b642buf(data.pubKey),ECDH_ALG,true,[]); if(password&&ourEcdhPair&&peerEcdhPub&&salt) await deriveSessionKey(); }catch(e){ addMsg('키 교환 실패','system'); }
}

async function submitPassword(){
  if(isDestroyed()) return;
  const errorEl=document.getElementById('passwordError'); errorEl.style.display='none';
  password=document.getElementById('chatPasswordInput').value.trim();
  if(!password){ errorEl.textContent='암호를 입력하세요.'; errorEl.style.display='block'; return; }
  if(!salt||!ourEcdhPair||!peerEcdhPub){ errorEl.textContent='상대방과의 보안 연결 준비 중...'; errorEl.style.display='block'; return; }
  if(handshakeDone) return;
  try{ await deriveAuthKey(); await deriveSessionKey(); handshakeDone=true; document.getElementById('passwordPrompt').style.display='none'; document.getElementById('securityCard').style.display='flex'; addMsg('🔐 세션 활성화','system'); updateOfflineLock(); }catch(e){ errorEl.textContent='세션 키 실패: '+e.message; errorEl.style.display='block'; }
}

async function deriveAuthKey(){
  const km = await crypto.subtle.importKey('raw',str2buf(password),'PBKDF2',false,['deriveKey']);
  authKey = await crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:PBKDF2_ITERS, hash:'SHA-512' }, km, { name:'AES-GCM', length:AES_LEN }, true, ['encrypt','decrypt']);
}

async function deriveSessionKey(){
  const ecdhBits = await crypto.subtle.deriveBits({ name:'ECDH', public:peerEcdhPub }, ourEcdhPair.privateKey, 521);
  const authRaw = await crypto.subtle.exportKey('raw', authKey);
  const ikm = concatBufs(ecdhBits, str2buf(password));
  const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveKey']);
  sessionKey = await crypto.subtle.deriveKey({ name:'HKDF', hash:'SHA-512', salt:authRaw, info:str2buf('session') }, hkdfKey, { name:'AES-GCM', length:AES_LEN }, true, ['encrypt','decrypt']);
  const sb = await crypto.subtle.exportKey('raw', sessionKey);
  const chainA = await hkdfExpand(sb, str2buf('chain-a'));
  const chainB = await hkdfExpand(sb, str2buf('chain-b'));
  const ourPub = await crypto.subtle.exportKey('raw', ourEcdhPair.publicKey);
  const peerPub = await crypto.subtle.exportKey('raw', peerEcdhPub);
  const weAreSmaller = compareBuffers(new Uint8Array(ourPub), new Uint8Array(peerPub)) < 0;
  sendChain = weAreSmaller ? { chain:chainA, seq:0 } : { chain:chainB, seq:0 };
  recvChain = weAreSmaller ? { chain:chainB, seq:-1 } : { chain:chainA, seq:-1 };
  document.getElementById('sessionFingerprint').textContent = buf2hex(await crypto.subtle.digest('SHA-256', sb)).slice(0,32);
  applyBlurToSensitiveElements();
  updateOfflineLock();
}

function compareBuffers(b1,b2){ for(let i=0;i<b1.byteLength;i++){ if(b1[i]<b2[i]) return -1; if(b1[i]>b2[i]) return 1; } return 0; }
async function hkdfExpand(prk, info){ const k = await crypto.subtle.importKey('raw',prk,{name:'HMAC',hash:HMAC_HASH},false,['sign']); const s = await crypto.subtle.sign('HMAC',k,info); return crypto.subtle.importKey('raw',s.slice(0,32),{name:'HMAC',hash:HMAC_HASH},false,['sign']); }
async function ratchetForward(chainRef){ const cur=chainRef.chain; const newChain=await crypto.subtle.sign('HMAC',cur,new Uint8Array([2])); chainRef.chain=await crypto.subtle.importKey('raw',newChain.slice(0,32),{name:'HMAC',hash:HMAC_HASH},false,['sign']); const msgKey=await crypto.subtle.sign('HMAC',cur,new Uint8Array([1])); return crypto.subtle.importKey('raw',msgKey.slice(0,32),{name:'AES-GCM',length:AES_LEN},false,['encrypt','decrypt']); }
async function encryptPayload(obj){ if(!sendChain) throw new Error('세션키 없음'); const mk=await ratchetForward(sendChain); const iv=crypto.getRandomValues(new Uint8Array(16)); const padded={...obj,_pad:Math.random().toString(36).slice(2,10)}; const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},mk,str2buf(JSON.stringify(padded))); return {seq:sendChain.seq++,iv:Array.from(new Uint8Array(iv)),ct:Array.from(new Uint8Array(ct))}; }
async function decryptPayload(d){ if(!recvChain) throw new Error('세션키 없음'); const {seq,iv,ct}=d; const prevChain=recvChain.chain,prevSeq=recvChain.seq; try{ if(seq<=recvChain.seq) throw new Error('Invalid seq'); while(recvChain.seq<seq-1){await ratchetForward(recvChain);recvChain.seq++;} const mk=await ratchetForward(recvChain); recvChain.seq=seq; const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(iv)},mk,new Uint8Array(ct)); const obj=JSON.parse(textDecoder.decode(plain)); delete obj._pad; return obj; }catch(e){recvChain.chain=prevChain;recvChain.seq=prevSeq;throw e;} }

async function sendText(){
  if(isDestroyed()) return;
  const inp=document.getElementById('msgInput'); const txt=inp.value.trim(); if(!txt) return;
  const msgId=genUUID(); const payload={type:'text',content:txt,id:msgId};
  if(!dc||dc.readyState!=='open'||!sessionKey){ if(sessionKey){pendingOutbox.push({payload,id:msgId});addMsg(txt,'me',msgId);addMsg('⏳ 오프라인-복구 시 전송','system');}else addMsg('⚠️ 암호를 설정하세요.','system'); inp.value=''; return; }
  try{ const enc=await encryptPayload(payload); dc.send(JSON.stringify({type:'msg',...enc})); addMsg(txt,'me',msgId); }catch(e){pendingOutbox.push({payload,id:msgId});addMsg(txt,'me',msgId);addMsg('⚠️ 전송 실패-대기열 저장','system');}
  inp.value='';
}

function onMsg(e){
  if(isDestroyed()) return;
  if(e.data instanceof ArrayBuffer){handleBinaryChunk(e.data);return;}
  try{ const d=JSON.parse(e.data); if(d.type==='__ecdhe__'){handleEcdheMessage(d);return;} if(d.type==='msg'){ if(!sessionKey){addEncryptedMessage(d);return;} decryptPayload(d).then(inner=>{ if(isDestroyed()) return; if(inner.id&&receivedMessageIds.has(inner.id))return; if(inner.id)receivedMessageIds.add(inner.id); if(inner.type==='text'){addMsg(inner.content,'other',inner.id);sendReadReceipt(inner.id);}else if(inner.type==='read')markAsRead(inner.id);else if(inner.type==='delete')document.getElementById('msg-'+inner.id)?.remove();else if(inner.type==='file_start')handleFileStart(inner);else if(inner.type==='file_end'){if(fileReceive&&fileReceive.id===inner.id)assembleFile();}else if(inner.type==='__destroy__'){markDestroyed();executeDestroy();} }).catch(()=>addEncryptedMessage(d)); } }catch(e){}
}

async function destroyChat(){
  if(!sessionKey||!dc||dc.readyState!=='open'){ markDestroyed(); executeDestroy(); return; }
  if(!confirm('⚠️ 상대방과 나의 모든 대화 기록을 영구 삭제합니다.\n복구는 절대 불가능합니다.\n계속하시겠습니까?')) return;
  try{ const enc=await encryptPayload({type:'__destroy__',timestamp:Date.now()}); dc.send(JSON.stringify({type:'msg',...enc})); }catch(e){}
  markDestroyed(); executeDestroy();
}

function addEncryptedMessage(rawData){
  if(isDestroyed()) return;
  const c=document.getElementById('messages'), d=document.createElement('div'); d.className='msg system';
  d.innerHTML=`<div class="encrypted-bubble blur-target"><strong>🔒 암호화된 메시지</strong><br>${escapeHtml(JSON.stringify(rawData,null,2))}</div>`;
  c.appendChild(d); c.scrollTop=c.scrollHeight; applyBlurToSensitiveElements(); updateOfflineLock();
}

async function sendReadReceipt(msgId){ if(!sessionKey||isDestroyed()) return; try{ const enc=await encryptPayload({type:'read',id:msgId}); dc.send(JSON.stringify({type:'msg',...enc})); }catch(e){} }
async function deleteMessage(msgId){ if(!sessionKey||isDestroyed()) return; try{ const enc=await encryptPayload({type:'delete',id:msgId}); dc.send(JSON.stringify({type:'msg',...enc})); document.getElementById('msg-'+msgId)?.remove(); }catch(e){} }

function addMsg(text, who, msgId){
  if(isDestroyed()) return;
  const c=document.getElementById('messages'), d=document.createElement('div');
  d.className='msg '+(who==='me'?'me':who==='other'?'other':'system');
  if(msgId) d.id='msg-'+msgId;
  let bubble=escapeHtml(text);
  let timeHtml=`<div class="time">${new Date().toLocaleTimeString()}`;
  if(who==='me'&&msgId) timeHtml+=` <button class="btn-small" style="background:none;color:var(--danger);padding:2px 6px;" onclick="deleteMessage('${msgId}')">✕</button>`;
  timeHtml+=`</div>`;
  if(fileReceive&&text.startsWith('📥')) bubble+=`<div class="progress"><div class="progress-bar" id="file-progress"></div></div>`;
  d.innerHTML=`<div class="bubble blur-target">${bubble}${timeHtml}<div class="noise-layer"></div></div>`;
  c.appendChild(d); c.scrollTop=c.scrollHeight; applyBlurToSensitiveElements(); updateOfflineLock();
}

function markAsRead(msgId){ const el=document.getElementById('msg-'+msgId); if(el){ const t=el.querySelector('.time'); if(t&&!t.querySelector('.read')) t.innerHTML+=' <span class="read" style="color:var(--success);">✓✓</span>'; } }

// ==================== 대용량 파일 전송 (Blob 기반) ====================
function handleFileStart(inner){
  fileReceive = { id:inner.id, name:inner.name, size:inner.size, fek:b642buf(inner.fek), chunks:[], received:0 };
  addMsg(`📥 ${inner.name} (${formatBytes(inner.size)})`,'other');
}
function handleBinaryChunk(buf){
  if(!fileReceive) return;
  fileReceive.chunks.push(new Uint8Array(buf));
  fileReceive.received += buf.byteLength;
  const pb = document.getElementById('file-progress');
  if(pb) pb.style.width = Math.min(100, Math.round(fileReceive.received / fileReceive.size * 100)) + '%';
}
async function assembleFile(){
  if(!fileReceive||isDestroyed()) return;
  const blob = new Blob(fileReceive.chunks);
  const iv = blob.slice(0, 12);
  const ct = blob.slice(12);
  const key = await crypto.subtle.importKey('raw', fileReceive.fek, 'AES-GCM', false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv: await iv.arrayBuffer()}, key, await ct.arrayBuffer());
  const decBlob = new Blob([plain]);
  const url = URL.createObjectURL(decBlob);
  const c = document.getElementById('messages'), d = document.createElement('div'); d.className='msg other';
  let html = `<div class="bubble blur-target"><div class="file-bubble"><span>📎 ${escapeHtml(fileReceive.name)}</span>`;
  if(decBlob.type.startsWith('image/')) html += `<div class="file-preview"><img src="${url}"></div>`;
  else if(decBlob.type.startsWith('video/')) html += `<div class="file-preview"><video controls src="${url}"></video></div>`;
  html += `<a href="${url}" download="${escapeHtml(fileReceive.name)}" style="color:var(--accent);">다운로드</a></div><div class="time">${new Date().toLocaleTimeString()}</div><div class="noise-layer"></div></div>`;
  d.innerHTML = html; c.appendChild(d); c.scrollTop = c.scrollHeight;
  fileReceive = null; applyBlurToSensitiveElements(); updateOfflineLock();
}
async function handleFiles(files){ for(const f of files) await sendFile(f); }
async function sendFile(file){
  if(!dc||dc.readyState!=='open'||!sessionKey||isDestroyed()) return;
  const fileId = genUUID();
  const fek = await crypto.subtle.generateKey({name:'AES-GCM', length:AES_LEN}, true, ['encrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const fekRaw = await crypto.subtle.exportKey('raw', fek);
  const fileBuf = await file.arrayBuffer();
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, fek, fileBuf);
  const encData = new Uint8Array(iv.byteLength + ct.byteLength);
  encData.set(iv); encData.set(new Uint8Array(ct), iv.byteLength);
  const metaEnc = await encryptPayload({type:'file_start', id:fileId, name:file.name, size:encData.byteLength, fek:buf2b64(fekRaw)});
  dc.send(JSON.stringify({type:'msg', ...metaEnc}));
  addMsg(`📤 ${file.name} 전송 중...`, 'me');
  const chunkSize = 256 * 1024;
  let offset = 0;
  while(offset < encData.byteLength){
    const end = Math.min(offset + chunkSize, encData.byteLength);
    dc.send(encData.slice(offset, end).buffer);
    offset = end;
    await new Promise(r => setTimeout(r, 10));
  }
  const endEnc = await encryptPayload({type:'file_end', id:fileId});
  dc.send(JSON.stringify({type:'msg', ...endEnc}));
  addMsg(`📤 ${file.name} 전송 완료`, 'me');
}

function showChat(){ if(isDestroyed()){showSimple();return;} document.getElementById('simpleMode').style.display='none';document.getElementById('chatScreen').style.display='flex';applyBlurToSensitiveElements();updateOfflineLock(); }
function showSimple(){ document.getElementById('simpleMode').style.display='block';document.getElementById('chatScreen').style.display='none'; }
function closeConnection(){ if(pc){pc.close();pc=null;}dc=null;typingChannel=null;authKey=sessionKey=null;sendChain=recvChain=null;salt=null;ourEcdhPair=null;peerEcdhPub=null;fileReceive=null;password=null;handshakeDone=false;receivedMessageIds.clear();pendingOutbox=[];document.getElementById('sessionFingerprint').textContent='';document.getElementById('securityCard').style.display='none';document.getElementById('passwordPrompt').style.display='block';document.getElementById('passwordError').style.display='none';updateOfflineLock(); }
function formatBytes(b){ return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':b<1073741824?(b/1048576).toFixed(1)+' MB':(b/1073741824).toFixed(1)+' GB'; }
function toggleSecurityDetail(){ document.getElementById('securityDetail').classList.toggle('hidden'); }
function copyTextById(id){ const el=document.getElementById(id); const text=el.tagName==='INPUT'||el.tagName==='TEXTAREA'?el.value:el.textContent; navigator.clipboard.writeText(text).then(()=>{}).catch(()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);alert('링크가 복사되었습니다.');}); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
