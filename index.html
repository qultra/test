<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 암호 채팅 – 200개 서버·궁극 보안·완전 삭제</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src *; media-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; referrer no-referrer;">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --bg: #06090f; --surface: #0f141e; --card: rgba(15,20,30,0.9);
      --text: #e0e5f0; --sub: #8892b0; --accent: #5b8df0; --danger: #f97070;
      --success: #45d68a; --border: #1a2332; --radius: 20px; --radius-sm: 14px;
    }
    * {
      margin:0; padding:0; box-sizing:border-box;
      user-select: none !important; -webkit-user-select: none !important; -moz-user-select: none !important;
      -webkit-touch-callout: none !important;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-modify: read-only;
    }
    input, textarea {
      -webkit-user-modify: read-write !important;
      user-select: text !important; -webkit-user-select: text !important;
    }
    @media print {
      html, body, .container, #chatScreen { display: none !important; }
      html::before { content: "🔒 인쇄가 차단되었습니다."; color: red; font-size: 3rem; text-align: center; display: block; padding-top: 50vh; }
    }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
      -webkit-backface-visibility: hidden; backface-visibility: hidden;
      overscroll-behavior: none;
    }
    .container {
      width: 100%; max-width: 520px; height: 95dvh;
      background: var(--surface); border-radius: 30px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    #antiScreenshotCanvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index: 9998; pointer-events: none; opacity: 0.03;
      mix-blend-mode: difference;
    }
    .blur-target {
      filter: blur(12px) !important;
      transition: filter 0.2s ease;
      cursor: pointer;
    }
    .blur-target.revealed { filter: blur(0) !important; }
    .blur-target.locked { filter: blur(20px) !important; cursor: not-allowed; pointer-events: auto; }

    .header { padding:14px 20px; background:rgba(8,14,24,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .header h1 { font-size:1.1rem; font-weight:700; background:linear-gradient(135deg,#90b4ff,#b794f4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-bar { display:flex; align-items:center; gap:7px; }
    .dot { width:10px; height:10px; border-radius:50%; transition:0.2s; }
    .dot.on { background:var(--success); box-shadow:0 0 10px var(--success); }
    .dot.off { background:var(--danger); }
    .main-content { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; }
    .main-content::-webkit-scrollbar { width:4px; } .main-content::-webkit-scrollbar-thumb { background:#253040; border-radius:2px; }

    .card { background:var(--card); backdrop-filter:blur(14px); border-radius:var(--radius); padding:18px; margin-bottom:12px; border:1px solid var(--border); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); padding:12px 20px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:0.9rem; transition:0.2s; width:100%; backdrop-filter:blur(10px); }
    .btn:hover { background:rgba(255,255,255,0.12); transform:translateY(-1px); }
    .btn:active { transform:scale(0.97); }
    .btn.primary { background:var(--accent); border:none; }
    .btn.danger { background:var(--danger); border:none; }
    .btn-small { padding:7px 12px; font-size:0.8rem; width:auto; }
    .btn-group { display:flex; gap:8px; } .btn-group .btn { flex:1; }

    input, textarea { width:100%; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 15px; font-size:0.95rem; outline:none; user-select:text; -webkit-user-select:text; }
    input:focus, textarea:focus { border-color:var(--accent); }

    #chatScreen { display:none; flex-direction:column; flex:1; }
    #messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:6px 0; }
    .msg { display:flex; flex-direction:column; animation:fadeUp 0.2s ease; }
    .msg.system { align-items:center; } .msg.me { align-items:flex-end; } .msg.other { align-items:flex-start; }
    .bubble { max-width:83%; padding:10px 16px; border-radius:20px; background:rgba(22,30,44,0.85); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); word-break:break-word; position:relative; overflow:hidden; z-index:1; }
    .bubble .noise-layer {
      position: absolute; top:0; left:0; width:100%; height:100%;
      background: repeating-linear-gradient(transparent 0px, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
      pointer-events: none; z-index:2;
    }
    .msg.system .bubble { background:rgba(255,255,255,0.04); border:none; font-size:0.78rem; color:var(--sub); }
    .msg.me .bubble { background:linear-gradient(140deg,rgba(74,130,250,0.5),rgba(124,92,240,0.5)); border-bottom-right-radius:6px; }
    .msg.other .bubble { border-bottom-left-radius:6px; }
    .msg .time { font-size:0.65rem; color:var(--sub); margin-top:4px; display:flex; justify-content:flex-end; gap:6px; position:relative; z-index:5; }
    .encrypted-bubble { background:#0a0f18; border:1px solid var(--border); font-family:monospace; font-size:0.7rem; color:#94a3b8; white-space:pre-wrap; word-break:break-all; padding:10px; border-radius:12px; max-width:90%; }
    .progress { height:3px; background:#1e293b; border-radius:2px; overflow:hidden; margin-top:6px; }
    .progress-bar { height:100%; width:0%; background:var(--accent); transition:width 0.3s; }
    .file-preview img, .file-preview video { max-width:180px; max-height:140px; border-radius:12px; border:1px solid var(--border); }

    .input-bar { display:flex; gap:6px; padding:10px 0 0; align-items:flex-end; }
    #msgInput { flex:1; min-height:42px; max-height:110px; resize:none; }
    .icon-btn { background:none; border:none; font-size:1.3rem; cursor:pointer; padding:8px; color:var(--accent); }
    .send-btn { background:var(--accent); color:white; width:42px; height:42px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; }

    .hidden { display:none !important; }
    .text-center { text-align:center; } .text-sub { color:var(--sub); font-size:0.82rem; }
    .mt { margin-top:10px; } .mb { margin-bottom:10px; }
    .link-box { word-break:break-all; background:#0a0f18; padding:10px; border-radius:12px; font-size:0.72rem; margin:8px 0; max-height:75px; overflow-y:auto; color:#9aa4bf; }
    .fingerprint { font-family:monospace; font-size:0.65rem; background:#0a0f18; padding:6px; border-radius:8px; word-break:break-all; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner { width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
  </style>
</head>
<body>
<canvas id="antiScreenshotCanvas"></canvas>
<div class="container">
  <div class="header"><h1>🔐 P2P 비밀채팅</h1><div class="status-bar"><span id="connDot" class="dot off"></span><span id="connLabel">오프라인</span></div></div>
  <div class="main-content" id="mainArea">
    <div id="simpleMode">
      <div class="card text-center"><h3 style="margin-bottom:6px;">서버 없이 완벽한 프라이버시</h3><p class="text-sub mb">512+급 종단간 암호화<br>200개 서버·오프라인 블러·완전 삭제</p><button class="btn primary" onclick="startNewChat()">✨ 새 채팅 생성</button><button class="btn mt" onclick="showJoinPanel()">📩 초대 링크로 참가</button></div>
      <div id="offerPanel" class="hidden"><div class="card text-center"><div class="spinner mb" id="offerSpinner"></div><p><strong>연결 링크 생성 중...</strong></p><p class="text-sub">생성된 링크를 상대에게 전송하세요.</p><div class="link-box" id="offerLinkDisplay">생성 중...</div><button class="btn mt" onclick="copyTextById('offerLinkDisplay')">📋 링크 복사</button><p class="text-sub mt">상대가 보낸 Answer 링크를 아래에 붙여넣으세요.</p><input type="text" id="answerLinkInput" placeholder="Answer 링크 입력..."><button class="btn primary mt" onclick="applyAnswerLink()">✅ 연결 완료</button></div></div>
      <div id="answerPanel" class="hidden"><div id="autoAnswerContent" class="hidden"><div class="card text-center"><div class="spinner mb" id="answerSpinner"></div><p>초대 링크 분석 중...</p></div><div id="answerReadyPanel" class="hidden card text-center"><p><strong>✅ Answer 링크 준비 완료</strong></p><p class="text-sub">아래 링크를 방장에게 전송하세요.</p><div class="link-box" id="answerLinkDisplay">생성 중...</div><button class="btn mt" onclick="copyTextById('answerLinkDisplay')">📋 링크 복사</button></div></div><div id="manualJoinContent"><div class="card"><strong>📥 초대 링크 붙여넣기</strong><textarea id="remoteOfferSDP" rows="3" placeholder="방장의 초대 링크 전체..."></textarea><button class="btn primary mt" onclick="createAnswerFromOffer()">🔄 Answer 생성</button></div><div id="answerResultPanel" class="hidden card"><strong>📤 내 Answer 링크</strong><div class="link-box" id="localAnswerLinkDisplay"></div><button class="btn mt" onclick="copyTextById('localAnswerLinkDisplay')">📋 복사해서 방장에게 전송</button></div></div></div>
    </div>
    <div id="chatScreen">
      <div id="securityCard" class="card" style="margin:0 0 8px; padding:8px 14px; font-size:0.78rem; display:none; align-items:center; gap:6px;"><span>🔒 세션:</span><span id="sessionFingerprint" class="fingerprint blur-target" style="flex:1;"></span><button class="btn-small danger" onclick="destroyChat()">💣 대화 폭파</button></div>
      <div id="passwordPrompt" class="card text-center"><strong>🔐 채팅방 암호 입력</strong><input type="password" id="chatPasswordInput" placeholder="상대와 공유한 암호"><button class="btn primary mt" id="submitPasswordBtn" onclick="submitPassword()">암호 설정</button><p class="text-sub mt">암호가 없으면 수신된 암호문만 표시됩니다.</p><p id="passwordError" class="text-sub" style="color:var(--danger); display:none;"></p></div>
      <div id="messages"></div>
      <div class="input-bar" id="inputBar"><button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="파일">📎</button><textarea id="msgInput" rows="1" placeholder="메시지 (종단간 암호화)" autocomplete="off"></textarea><button class="send-btn" onclick="sendText()">➤</button></div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
    </div>
  </div>
</div>

<script>
// =====================================================================
//  200개 ICE 서버 (STUN/TURN) – 무료·공개 리스트, 중복 없음
// =====================================================================
var ICE_SERVERS_LIST = (function() {
  var servers = [];
  function addSTUN(host, ports) {
    ports = ports || [3478, 5349, 19302, 10000];
    ports.forEach(function(p) { servers.push({ urls: 'stun:' + host + ':' + p }); });
  }
  function addTURN(host, ports, user, cred) {
    ports = ports || [3478];
    ports.forEach(function(p) {
      servers.push({ urls: 'turn:' + host + ':' + p, username: user, credential: cred });
      servers.push({ urls: 'turn:' + host + ':' + p + '?transport=tcp', username: user, credential: cred });
    });
  }
  var stunHosts = [
    'stun.l.google.com', 'stun1.l.google.com', 'stun2.l.google.com', 'stun3.l.google.com', 'stun4.l.google.com',
    'stun.cloudflare.com', 'global.stun.twilio.com',
    'stun.freeswitch.org', 'stun.nextcloud.com',
    'stun.viagenie.ca', 'stun.ekiga.net', 'stun.linphone.org', 'stun.iptel.org',
    'stun.services.mozilla.com',
    'stun.sipgate.net', 'stun.schlund.de', 'stun.voiparound.com', 'stun.voipbuster.com',
    'stun.voipstunt.com', 'stun.12voip.com', 'stun.1und1.de', 'stun.gmx.net', 'stun.web.de',
    'stun.rockenstein.de', 'stun.voipgate.com', 'stun.phonepower.com',
    'stun.12connect.com', 'stun.3cx.com', 'stun.aetaaudio.com', 'stun.audiocodes.com',
    'stun.bandwidth.com', 'stun.callcentric.com', 'stun.counterpath.com', 'stun.dls.net',
    'stun.easyvoip.com', 'stun.halonet.pl', 'stun.internetcalls.com', 'stun.intervoip.com',
    'stun.ipcomms.net', 'stun.it1.de', 'stun.justvoip.com', 'stun.livevoip.com',
    'stun.lowratevoip.com', 'stun.netappel.com', 'stun.netelip.com', 'stun.nfon.net',
    'stun.nonoh.net', 'stun.ooma.com', 'stun.pbxes.com', 'stun.phoneserve.com',
    'stun.sipdiscount.com', 'stun.sipnet.net', 'stun.smartvoip.com', 'stun.speedflow.com',
    'stun.t-online.de', 'stun.telbo.com', 'stun.telio.no', 'stun.telstra.com', 'stun.tng.de',
    'stun.twt.it', 'stun.vivox.com', 'stun.voip.aebc.com', 'stun.voip.eutelia.it',
    'stun.voipcheap.com', 'stun.voipdiscount.com', 'stun.voipraider.com', 'stun.vonage.com',
    'stun.voxox.com', 'stun.zadarma.com'
  ];
  stunHosts.forEach(function(h) { addSTUN(h); });
  addTURN('openrelay.metered.ca', [80, 443], 'openrelayproject', 'openrelayproject');
  addTURN('turn.anyfirewall.com', [443], 'webrtc', 'webrtc');
  addTURN('numb.viagenie.ca', [3478, 80, 443], 'webrtc@live.com', 'muazkh');
  addTURN('turn.matrix.org', [3478], 'matrix', 'matrix');
  var seen = {};
  var unique = [];
  for (var i = 0; i < servers.length; i++) {
    var key = JSON.stringify(servers[i]);
    if (!seen[key]) { seen[key] = true; unique.push(servers[i]); }
  }
  return unique.slice(0, 200);
})();

// =====================================================================
//  블러 관리 – 온라인 상태일 때만 해제 가능
// =====================================================================
var isOnline = false;

function applyBlurToSensitiveElements() {
  var els = document.querySelectorAll('.bubble');
  for (var i = 0; i < els.length; i++) {
    if (!els[i].classList.contains('blur-target') && !els[i].closest('#msgInput') && !els[i].closest('.input-bar')) {
      els[i].classList.add('blur-target');
    }
  }
  els = document.querySelectorAll('.fingerprint, .link-box, .encrypted-bubble');
  for (var j = 0; j < els.length; j++) {
    if (!els[j].classList.contains('blur-target')) els[j].classList.add('blur-target');
  }
}

document.addEventListener('click', function(e) {
  if (!isOnline) return;
  var target = e.target.closest('.blur-target');
  if (target && !target.classList.contains('locked')) {
    target.classList.add('revealed');
    setTimeout(function() { target.classList.remove('revealed'); }, 2500);
  }
});

var securityLockLevel = 0;
var globalBlurTimer = null;
function lockAllBlurs(duration) {
  duration = duration || 10000;
  var els = document.querySelectorAll('.blur-target');
  for (var i = 0; i < els.length; i++) {
    els[i].classList.add('locked');
    els[i].classList.remove('revealed');
  }
  clearTimeout(globalBlurTimer);
  globalBlurTimer = setTimeout(function() {
    var locked = document.querySelectorAll('.blur-target.locked');
    for (var j = 0; j < locked.length; j++) locked[j].classList.remove('locked');
  }, duration);
}
function triggerSecurityLock(level) {
  level = level || 1;
  securityLockLevel = Math.max(securityLockLevel, level);
  if (securityLockLevel >= 2) lockAllBlurs(15000);
  else if (securityLockLevel >= 1) lockAllBlurs(5000);
  setTimeout(function() { securityLockLevel = Math.max(0, securityLockLevel - 1); }, 30000);
}

// =====================================================================
//  완전 삭제 – 채팅방 자체 차단
// =====================================================================
var DESTROY_KEY = 'p2p_chat_destroyed_final';
var DESTROY_SESSION_KEY = 'p2p_chat_destroyed_session_final';
function isDestroyed() { return !!(localStorage.getItem(DESTROY_KEY) || sessionStorage.getItem(DESTROY_SESSION_KEY)); }
function markDestroyed() {
  var ts = Date.now();
  localStorage.setItem(DESTROY_KEY, ts);
  sessionStorage.setItem(DESTROY_SESSION_KEY, ts);
  if (location.hash) history.replaceState(null, '', location.pathname);
}
function clearDestroyedFlags() {
  localStorage.removeItem(DESTROY_KEY);
  sessionStorage.removeItem(DESTROY_SESSION_KEY);
}
setInterval(function() {
  if (isDestroyed()) {
    document.getElementById('simpleMode').style.display = 'block';
    document.getElementById('chatScreen').style.display = 'none';
  }
}, 500);

function executeDestroy() {
  document.getElementById('messages').innerHTML = '';
  receivedMessageIds.clear();
  pendingOutbox = [];
  markDestroyed();
  document.getElementById('simpleMode').style.display = 'block';
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('securityCard').style.display = 'none';
  document.getElementById('sessionFingerprint').textContent = '';
  document.getElementById('passwordPrompt').style.display = 'block';
  document.getElementById('passwordError').style.display = 'none';
  if (pc) { pc.close(); pc = null; }
  dc = null; typingChannel = null;
  authKey = sessionKey = null; sendChain = recvChain = null;
  salt = null; ourEcdhPair = null; peerEcdhPub = null; fileReceive = null; password = null;
  handshakeDone = false; isOnline = false;
  updateConn(false);
  var els = document.querySelectorAll('.blur-target');
  for (var i = 0; i < els.length; i++) {
    els[i].classList.remove('blur-target', 'revealed', 'locked');
  }
}

// =====================================================================
//  보안 레이어 (단축키, 복사 방지 등) – 옵셔널 체이닝 제거
// =====================================================================
var ua = navigator.userAgent || '', plt = navigator.platform || '';
var isWin = /Windows/i.test(ua) || plt === 'Win32' || plt === 'Win64';
var isMac = /Macintosh/i.test(ua) || plt === 'MacIntel' || plt === 'MacPPC';
var isLinux = /Linux/i.test(ua) && !/Android/i.test(ua);

function logViolation(r) { triggerSecurityLock(1); }

window.addEventListener('beforeprint', function(e) { e.preventDefault(); triggerSecurityLock(3); });
window.addEventListener('print', function(e) { e.preventDefault(); triggerSecurityLock(3); });

document.addEventListener('keydown', function(e) {
  var b = false;
  var k = e.key.toLowerCase();
  if (k === 'f12' || k === 'printscreen') b = true;
  if ((e.ctrlKey || e.metaKey) && (k === 's' || k === 'p' || k === 'u')) b = true;
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (k === 'i' || k === 'c' || k === 'j')) b = true;
  if (e.altKey && k === 'printscreen') b = true;
  if (isWin) {
    if (k === 'meta' || k === 'win') b = true;
    if (e.metaKey && (k === 'g' || k === 'r' || k === 's' || k === 't')) b = true;
    if (e.metaKey && e.altKey && k === 'r') b = true;
    if (e.metaKey && e.shiftKey && k === 's') b = true;
  }
  if (isMac) {
    if (e.metaKey && e.shiftKey && (k === '3' || k === '4' || k === '5')) b = true;
    if (e.metaKey && e.shiftKey && e.ctrlKey && (k === '3' || k === '4')) b = true;
  }
  if (isLinux) {
    if (k === 'printscreen') b = true;
    if ((e.altKey || e.shiftKey || e.ctrlKey || e.metaKey) && k === 'printscreen') b = true;
  }
  if (b) { e.preventDefault(); e.stopPropagation(); logViolation('key'); }
}, true);

document.addEventListener('contextmenu', function(e) { e.preventDefault(); logViolation('ctx'); });
document.addEventListener('dragstart', function(e) { e.preventDefault(); logViolation('drag'); });
document.addEventListener('selectstart', function(e) { if (!e.target.matches('input,textarea')) { e.preventDefault(); logViolation('sel'); } });
document.addEventListener('copy', function(e) { if (!e.target.matches('input,textarea')) { e.preventDefault(); logViolation('copy'); } });
document.addEventListener('cut', function(e) { if (!e.target.matches('input,textarea')) { e.preventDefault(); logViolation('cut'); } });

var tSy = 0, tSx = 0, tSt = 0;
document.addEventListener('touchstart', function(e) {
  if (e.touches.length > 1) { logViolation('multi'); e.preventDefault(); }
  if (e.touches.length === 1) { tSy = e.touches[0].clientY; tSx = e.touches[0].clientX; tSt = Date.now(); }
}, {passive: false});
document.addEventListener('touchmove', function(e) { if (e.touches.length > 1) e.preventDefault(); }, {passive: false});
document.addEventListener('touchend', function(e) {
  var n = Date.now();

  var padded = Object.assign({}, obj, { _pad: Math.random().toString(36).slice(2, 10) });
  var ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, mk, str2buf(JSON.stringify(padded)));
  return { seq: sendChain.seq++, iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}
async function decryptPayload(d) {
  if (!recvChain) throw new Error('세션키 없음');
  var seq = d.seq, iv = d.iv, ct = d.ct;
  var prevChain = recvChain.chain, prevSeq = recvChain.seq;
  try {
    if (seq <= recvChain.seq) throw new Error('Invalid seq');
    while (recvChain.seq < seq - 1) { await ratchetForward(recvChain); recvChain.seq++; }
    var mk = await ratchetForward(recvChain);
    recvChain.seq = seq;
    var plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, mk, new Uint8Array(ct));
    var obj = JSON.parse(textDecoder.decode(plain));
    delete obj._pad;
    return obj;
  } catch (e) { recvChain.chain = prevChain; recvChain.seq = prevSeq; throw e; }
}

async function sendText() {
  if (isDestroyed()) return;
  var inp = document.getElementById('msgInput');
  var txt = inp.value.trim();
  if (!txt) return;
  var msgId = genUUID();
  var payload = { type: 'text', content: txt, id: msgId };
  if (!dc || dc.readyState !== 'open' || !sessionKey) {
    if (sessionKey) {
      pendingOutbox.push({ payload: payload, id: msgId });
      addMsg(txt, 'me', msgId);
      addMsg('⏳ 오프라인-복구 시 전송', 'system');
    } else addMsg('⚠️ 암호를 설정하세요.', 'system');
    inp.value = '';
    return;
  }
  try {
    var enc = await encryptPayload(payload);
    dc.send(JSON.stringify({ type: 'msg', seq: enc.seq, iv: enc.iv, ct: enc.ct }));
    addMsg(txt, 'me', msgId);
  } catch (e) {
    pendingOutbox.push({ payload: payload, id: msgId });
    addMsg(txt, 'me', msgId);
    addMsg('⚠️ 전송 실패-대기열 저장', 'system');
  }
  inp.value = '';
}

function onMsg(e) {
  if (isDestroyed()) return;
  if (e.data instanceof ArrayBuffer) { handleBinaryChunk(e.data); return; }
  try {
    var d = JSON.parse(e.data);
    if (d.type === '__ecdhe__') { handleEcdheMessage(d); return; }
    if (d.type === 'msg') {
      if (!sessionKey) { addEncryptedMessage(d); return; }
      decryptPayload(d).then(function(inner) {
        if (isDestroyed()) return;
        if (inner.id && receivedMessageIds.has(inner.id)) return;
        if (inner.id) receivedMessageIds.add(inner.id);
        if (inner.type === 'text') { addMsg(inner.content, 'other', inner.id); sendReadReceipt(inner.id); }
        else if (inner.type === 'read') markAsRead(inner.id);
        else if (inner.type === 'delete') { var delEl = document.getElementById('msg-' + inner.id); if (delEl) delEl.remove(); }
        else if (inner.type === 'file_start') handleFileStart(inner);
        else if (inner.type === 'file_end') { if (fileReceive && fileReceive.id === inner.id) assembleFile(); }
        else if (inner.type === '__destroy__') { markDestroyed(); executeDestroy(); }
      }).catch(function() { addEncryptedMessage(d); });
    }
  } catch (e) {}
}

async function destroyChat() {
  if (!sessionKey || !dc || dc.readyState !== 'open') { markDestroyed(); executeDestroy(); return; }
  if (!confirm('⚠️ 상대방과 나의 모든 대화 기록을 영구 삭제합니다.\n복구는 절대 불가능합니다.\n계속하시겠습니까?')) return;
  try {
    var enc = await encryptPayload({ type: '__destroy__', timestamp: Date.now() });
    dc.send(JSON.stringify({ type: 'msg', seq: enc.seq, iv: enc.iv, ct: enc.ct }));
  } catch (e) {}
  markDestroyed();
  executeDestroy();
}

function addEncryptedMessage(rawData) {
  if (isDestroyed()) return;
  var c = document.getElementById('messages');
  var d = document.createElement('div');
  d.className = 'msg system';
  d.innerHTML = '<div class="encrypted-bubble blur-target"><strong>🔒 암호화된 메시지</strong><br>' + escapeHtml(JSON.stringify(rawData, null, 2)) + '</div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  applyBlurToSensitiveElements();
}

async function sendReadReceipt(msgId) {
  if (!sessionKey || isDestroyed()) return;
  try {
    var enc = await encryptPayload({ type: 'read', id: msgId });
    dc.send(JSON.stringify({ type: 'msg', seq: enc.seq, iv: enc.iv, ct: enc.ct }));
  } catch (e) {}
}
async function deleteMessage(msgId) {
  if (!sessionKey || isDestroyed()) return;
  try {
    var enc = await encryptPayload({ type: 'delete', id: msgId });
    dc.send(JSON.stringify({ type: 'msg', seq: enc.seq, iv: enc.iv, ct: enc.ct }));
    var el = document.getElementById('msg-' + msgId);
    if (el) el.remove();
  } catch (e) {}
}

function addMsg(text, who, msgId) {
  if (isDestroyed()) return;
  var c = document.getElementById('messages');
  var d = document.createElement('div');
  d.className = 'msg ' + (who === 'me' ? 'me' : (who === 'other' ? 'other' : 'system'));
  if (msgId) d.id = 'msg-' + msgId;
  var bubble = escapeHtml(text);
  var timeHtml = '<div class="time">' + new Date().toLocaleTimeString();
  if (who === 'me' && msgId) timeHtml += ' <button class="btn-small" style="background:none;color:var(--danger);padding:2px 6px;" onclick="deleteMessage(\'' + msgId + '\')">✕</button>';
  timeHtml += '</div>';
  if (fileReceive && text.indexOf('📥') === 0) bubble += '<div class="progress"><div class="progress-bar" id="file-progress"></div></div>';
  d.innerHTML = '<div class="bubble blur-target">' + bubble + timeHtml + '<div class="noise-layer"></div></div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  applyBlurToSensitiveElements();
}

function markAsRead(msgId) {
  var el = document.getElementById('msg-' + msgId);
  if (el) {
    var t = el.querySelector('.time');
    if (t && !t.querySelector('.read')) t.innerHTML += ' <span class="read" style="color:var(--success);">✓✓</span>';
  }
}

// =====================================================================
//  대용량 파일 전송 (Blob 기반)
// =====================================================================
function handleFileStart(inner) {
  fileReceive = { id: inner.id, name: inner.name, size: inner.size, fek: b642buf(inner.fek), chunks: [], received: 0 };
  addMsg('📥 ' + inner.name + ' (' + formatBytes(inner.size) + ')', 'other');
}
function handleBinaryChunk(buf) {
  if (!fileReceive) return;
  fileReceive.chunks.push(new Uint8Array(buf));
  fileReceive.received += buf.byteLength;
  var pb = document.getElementById('file-progress');
  if (pb) pb.style.width = Math.min(100, Math.round(fileReceive.received / fileReceive.size * 100)) + '%';
}
async function assembleFile() {
  if (!fileReceive || isDestroyed()) return;
  var blob = new Blob(fileReceive.chunks);
  var iv = blob.slice(0, 12);
  var ct = blob.slice(12);
  var key = await crypto.subtle.importKey('raw', fileReceive.fek, 'AES-GCM', false, ['decrypt']);
  var plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: await iv.arrayBuffer() }, key, await ct.arrayBuffer());
  var decBlob = new Blob([plain]);
  var url = URL.createObjectURL(decBlob);
  var c = document.getElementById('messages');
  var d = document.createElement('div');
  d.className = 'msg other';
  var html = '<div class="bubble blur-target"><div class="file-bubble"><span>📎 ' + escapeHtml(fileReceive.name) + '</span>';
  if (decBlob.type.startsWith('image/')) html += '<div class="file-preview"><img src="' + url + '"></div>';
  else if (decBlob.type.startsWith('video/')) html += '<div class="file-preview"><video controls src="' + url + '"></video></div>';
  html += '<a href="' + url + '" download="' + escapeHtml(fileReceive.name) + '" style="color:var(--accent);">다운로드</a></div><div class="time">' + new Date().toLocaleTimeString() + '</div><div class="noise-layer"></div></div>';
  d.innerHTML = html;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  fileReceive = null;
}
async function handleFiles(files) { for (var i = 0; i < files.length; i++) await sendFile(files[i]); }
async function sendFile(file) {
  if (!dc || dc.readyState !== 'open' || !sessionKey || isDestroyed()) return;
  var fileId = genUUID();
  var fek = await crypto.subtle.generateKey({ name: 'AES-GCM', length: AES_LEN }, true, ['encrypt']);
  var iv = crypto.getRandomValues(new Uint8Array(12));
  var fekRaw = await crypto.subtle.exportKey('raw', fek);
  var fileBuf = await file.arrayBuffer();
  var ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, fek, fileBuf);
  var encData = new Uint8Array(iv.byteLength + ct.byteLength);
  encData.set(iv);
  encData.set(new Uint8Array(ct), iv.byteLength);
  var metaEnc = await encryptPayload({ type: 'file_start', id: fileId, name: file.name, size: encData.byteLength, fek: buf2b64(fekRaw) });
  dc.send(JSON.stringify({ type: 'msg', seq: metaEnc.seq, iv: metaEnc.iv, ct: metaEnc.ct }));
  addMsg('📤 ' + file.name + ' 전송 중...', 'me');
  var chunkSize = 256 * 1024;
  var offset = 0;
  while (offset < encData.byteLength) {
    var end = Math.min(offset + chunkSize, encData.byteLength);
    dc.send(encData.slice(offset, end).buffer);
    offset = end;
    await new Promise(function(r) { setTimeout(r, 10); });
  }
  var endEnc = await encryptPayload({ type: 'file_end', id: fileId });
  dc.send(JSON.stringify({ type: 'msg', seq: endEnc.seq, iv: endEnc.iv, ct: endEnc.ct }));
  addMsg('📤 ' + file.name + ' 전송 완료', 'me');
}

function showChat() {
  if (isDestroyed()) { showSimple(); return; }
  document.getElementById('simpleMode').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  applyBlurToSensitiveElements();
}
function showSimple() {
  document.getElementById('simpleMode').style.display = 'block';
  document.getElementById('chatScreen').style.display = 'none';
}
function closeConnection() {
  if (pc) { pc.close(); pc = null; }
  dc = null; typingChannel = null;
  authKey = sessionKey = null; sendChain = recvChain = null;
  salt = null; ourEcdhPair = null; peerEcdhPub = null; fileReceive = null; password = null;
  handshakeDone = false;
  receivedMessageIds.clear();
  pendingOutbox = [];
  document.getElementById('sessionFingerprint').textContent = '';
  document.getElementById('securityCard').style.display = 'none';
  document.getElementById('passwordPrompt').style.display = 'block';
  document.getElementById('passwordError').style.display = 'none';
  isOnline = false;
  updateConn(false);
}
function formatBytes(b) {
  return b < 1024 ? b + ' B' : (b < 1048576 ? (b / 1024).toFixed(1) + ' KB' : (b < 1073741824 ? (b / 1048576).toFixed(1) + ' MB' : (b / 1073741824).toFixed(1) + ' GB'));
}
function toggleSecurityDetail() { document.getElementById('securityDetail').classList.toggle('hidden'); }
function copyTextById(id) {
  var el = document.getElementById(id);
  var text = el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' ? el.value : el.textContent;
  navigator.clipboard.writeText(text).then(function() {}).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    alert('링크가 복사되었습니다.');
  });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(m) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m];
  });
}

// base64url 헬퍼
function toBase64url(buf) {
  return btoa(String.fromCharCode.apply(null, new Uint8Array(buf))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
function fromBase64url(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4) str += '=';
  return Uint8Array.from(atob(str), function(c) { return c.charCodeAt(0); }).buffer;
}
function encodeSDP(obj) { return toBase64url(new TextEncoder().encode(JSON.stringify(obj))); }
function decodeSDP(str) { return JSON.parse(new TextDecoder().decode(fromBase64url(str))); }
