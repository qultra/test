<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 암호 채팅 – 최종 완벽 디버그 버전</title>
  <!-- CSP 및 메타 태그 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src *; media-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; referrer no-referrer;">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --bg: #06090f; --surface: #0f141e; --card: rgba(15,20,30,0.9);
      --text: #e0e5f0; --sub: #8892b0; --accent: #5b8df0; --danger: #f97070;
      --success: #45d68a; --border: #1a2332; --radius: 20px; --radius-sm: 14px;
    }
    * {
      margin:0; padding:0; box-sizing:border-box;
      user-select: none !important; -webkit-user-select: none !important; -moz-user-select: none !important;
      -webkit-touch-callout: none !important; -webkit-tap-highlight-color: transparent;
    }
    input, textarea { user-select: text !important; -webkit-user-select: text !important; }
    @media print { html, body { display: none !important; } }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px; overscroll-behavior: none;
    }
    .container {
      width: 100%; max-width: 520px; height: 95dvh;
      background: var(--surface); border-radius: 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    /* 블러 스타일 개선: 개별 메시지 본문에만 적용 */
    .blur-content {
      filter: blur(10px);
      transition: filter 0.15s ease;
      cursor: pointer;
    }
    .blur-content.revealed {
      filter: blur(0);
    }
    .header { padding:14px 20px; background:rgba(8,14,24,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .header h1 { font-size:1.1rem; font-weight:700; background:linear-gradient(135deg,#90b4ff,#b794f4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-dot { width:10px; height:10px; border-radius:50%; background:var(--danger); }
    .status-dot.online { background:var(--success); }
    .card { background:var(--card); backdrop-filter:blur(14px); border-radius:var(--radius); padding:18px; margin-bottom:12px; border:1px solid var(--border); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); padding:12px 20px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:0.9rem; width:100%; backdrop-filter:blur(10px); }
    .btn.primary { background:var(--accent); border:none; }
    .btn.danger { background:var(--danger); border:none; }
    .btn-small { padding:7px 12px; font-size:0.8rem; width:auto; }
    input, textarea { width:100%; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 16px; font-size:0.95rem; outline:none; }
    #messages { flex:1; overflow-y:auto; padding:8px 0; }
    .msg { margin-bottom:12px; display:flex; flex-direction:column; }
    .msg.me { align-items:flex-end; } .msg.other { align-items:flex-start; } .msg.system { align-items:center; }
    .bubble { max-width:85%; padding:10px 16px; border-radius:18px; background:rgba(22,30,44,0.85); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.05); word-break:break-word; }
    .msg.me .bubble { background:linear-gradient(135deg,rgba(59,130,246,0.4),rgba(139,92,246,0.4)); }
    .time { font-size:0.65rem; color:var(--sub); margin-top:4px; }
    .encrypted-bubble { background:#0a0f18; border:1px solid var(--border); font-family:monospace; font-size:0.7rem; color:#94a3b8; padding:10px; border-radius:12px; }
    .input-bar { display:flex; gap:6px; padding:10px 0; }
    #msgInput { flex:1; min-height:44px; }
    .icon-btn { background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--accent); }
    .send-btn { background:var(--accent); color:white; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .hidden { display:none !important; }
    .text-sub { color:var(--sub); font-size:0.82rem; }
    .link-box { word-break:break-all; background:#0a0f18; padding:10px; border-radius:12px; font-size:0.72rem; margin:8px 0; }
    .fingerprint { font-family:monospace; font-size:0.65rem; background:#0a0f18; padding:6px; border-radius:8px; }
    .spinner { width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>🔐 P2P 비밀채팅</h1><div class="status-dot" id="statusDot"></div></div>
  <div style="flex:1; overflow-y:auto; padding:16px;" id="mainArea">
    <!-- 초기 화면 -->
    <div id="simpleMode">
      <div class="card text-center" style="text-align:center;">
        <h3>서버 없이 완벽한 프라이버시</h3>
        <p class="text-sub">512+급 종단간 암호화 (ECDH P-521 + AES-256)</p>
        <button class="btn primary mt" onclick="startNewChat()">✨ 새 채팅 생성</button>
        <button class="btn mt" onclick="showJoinPanel()">📩 초대 링크로 참가</button>
      </div>
      <div id="offerPanel" class="hidden">
        <div class="card text-center">
          <div class="spinner mb" id="offerSpinner"></div>
          <p><strong>연결 링크 생성 중...</strong></p>
          <p class="text-sub">생성된 링크를 상대에게 전송하세요.</p>
          <div class="link-box" id="offerLinkDisplay"></div>
          <button class="btn mt" onclick="copyTextById('offerLinkDisplay')">📋 링크 복사</button>
          <p class="text-sub mt">상대가 보낸 Answer 링크를 아래에 붙여넣으세요.</p>
          <input type="text" id="answerLinkInput" placeholder="Answer 링크...">
          <button class="btn primary mt" onclick="applyAnswerLink()">✅ 연결 완료</button>
        </div>
      </div>
      <div id="answerPanel" class="hidden">
        <div id="autoAnswerContent" class="hidden">
          <div class="card text-center"><div class="spinner mb" id="answerSpinner"></div><p>초대 링크 분석 중...</p></div>
          <div id="answerReadyPanel" class="hidden card text-center">
            <p><strong>✅ Answer 링크 준비 완료</strong></p>
            <p class="text-sub">아래 링크를 방장에게 전송하세요.</p>
            <div class="link-box" id="answerLinkDisplay"></div>
            <button class="btn mt" onclick="copyTextById('answerLinkDisplay')">📋 링크 복사</button>
          </div>
        </div>
        <div id="manualJoinContent">
          <div class="card"><strong>📥 초대 링크 붙여넣기</strong>
            <textarea id="remoteOfferSDP" rows="3" placeholder="방장의 초대 링크 전체..."></textarea>
            <button class="btn primary mt" onclick="createAnswerFromOffer()">🔄 Answer 생성</button>
          </div>
          <div id="answerResultPanel" class="hidden card">
            <strong>📤 내 Answer 링크</strong>
            <div class="link-box" id="localAnswerLinkDisplay"></div>
            <button class="btn mt" onclick="copyTextById('localAnswerLinkDisplay')">📋 복사해서 방장에게 전송</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chatScreen" class="hidden" style="display:flex; flex-direction:column; flex:1;">
      <div id="securityCard" class="card" style="margin-bottom:8px; padding:8px 14px; font-size:0.78rem; display:none; align-items:center; gap:6px;">
        <span>🔒 세션:</span><span id="sessionFingerprint" class="fingerprint"></span>
        <button class="btn-small danger" onclick="destroyChat()">💣 대화 폭파</button>
      </div>
      <div id="passwordPrompt" class="card text-center">
        <strong>🔐 채팅방 암호 입력</strong>
        <input type="password" id="chatPasswordInput" placeholder="상대와 공유한 암호">
        <button class="btn primary mt" id="submitPasswordBtn" onclick="submitPassword()">암호 설정</button>
        <p class="text-sub mt">암호가 없으면 수신된 암호문만 표시됩니다.</p>
        <p id="passwordError" class="text-sub" style="color:var(--danger); display:none;"></p>
      </div>
      <div id="messages"></div>
      <div id="typingIndicator" class="typing-indicator" style="font-size:0.75rem; color:var(--sub); padding:4px 16px; display:none;">상대방이 입력 중...</div>
      <div class="input-bar" id="inputBar">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <textarea id="msgInput" rows="1" placeholder="메시지 (종단간 암호화)"></textarea>
        <button class="send-btn" onclick="sendText()">➤</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
    </div>
  </div>
</div>

<script>
// ==================== 극강 암호화 + 모든 버그 수정 ====================
const toBase64url = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
const fromBase64url = (str) => { str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; return Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer; };
const encodeSDP = (obj) => toBase64url(new TextEncoder().encode(JSON.stringify(obj)));
const decodeSDP = (str) => JSON.parse(new TextDecoder().decode(fromBase64url(str)));

// ---------- 블러 관리 (개별 메시지 본문에만 적용) ----------
function applyBlurToMessageBodies() {
  document.querySelectorAll('.blur-target').forEach(el => {
    if (!el.classList.contains('blur-content')) {
      el.classList.add('blur-content');
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        el.classList.add('revealed');
        setTimeout(() => el.classList.remove('revealed'), 2500);
      });
    }
  });
}

// ---------- 전역 변수 ----------
let pc, dc, isOfferer = false, password = null;
let authKey, sessionKey, sendChain, recvChain;
let ourEcdhPair = null, peerEcdhPub = null;
let salt;
let handshakeDone = false;
const ECDH_ALG = { name: 'ECDH', namedCurve: 'P-521' };
const PBKDF2_ITERS = 800000;
const SALT_SIZE = 128;
const AES_LEN = 256;
const HMAC_HASH = 'SHA-512';

let typingChannel = null;
let pendingOutbox = [];
const receivedMessageIds = new Set();
const DESTROY_KEY = 'p2p_destroy_v3';

// ---------- 파괴 로직 ----------
function isDestroyed() { return !!(localStorage.getItem(DESTROY_KEY) || sessionStorage.getItem(DESTROY_KEY)); }
function markDestroyed() { localStorage.setItem(DESTROY_KEY, Date.now()); sessionStorage.setItem(DESTROY_KEY, Date.now()); }
function clearDestroyed() { localStorage.removeItem(DESTROY_KEY); sessionStorage.removeItem(DESTROY_KEY); }
setInterval(() => { if (isDestroyed()) executeDestroy(); }, 1000);

function executeDestroy() {
  document.getElementById('messages').innerHTML = '';
  receivedMessageIds.clear(); pendingOutbox = [];
  markDestroyed();
  document.getElementById('simpleMode').classList.remove('hidden');
  document.getElementById('chatScreen').classList.add('hidden');
  if (pc) { pc.close(); pc = null; }
  dc = null; typingChannel = null;
  authKey = sessionKey = null; sendChain = recvChain = null;
  salt = null; ourEcdhPair = null; peerEcdhPub = null; password = null; handshakeDone = false;
  document.getElementById('securityCard').style.display = 'none';
  document.getElementById('passwordPrompt').classList.remove('hidden');
  document.querySelectorAll('.blur-content').forEach(el => el.classList.remove('blur-content','revealed'));
}

// ---------- WebRTC 상태 표시 ----------
function updateConnectionStatus(connected) {
  const dot = document.getElementById('statusDot');
  if (connected) dot.classList.add('online');
  else dot.classList.remove('online');
}

// ---------- UI 전환 ----------
function showChat() {
  if (isDestroyed()) return;
  document.getElementById('simpleMode').classList.add('hidden');
  document.getElementById('chatScreen').classList.remove('hidden');
  document.getElementById('chatScreen').style.display = 'flex';
  applyBlurToMessageBodies();
}

// ---------- P2P 연결 ----------
async function startNewChat() {
  clearDestroyed(); closeConnection(); isOfferer = true;
  document.getElementById('offerPanel').classList.remove('hidden');
  document.getElementById('answerPanel').classList.add('hidden');
  document.getElementById('offerSpinner').style.display = 'inline-block';
  initPC(); createChannels();
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitIce();
  document.getElementById('offerSpinner').style.display = 'none';
  document.getElementById('offerLinkDisplay').textContent = location.origin + location.pathname + '#offer=' + encodeSDP(pc.localDescription);
}

async function applyAnswerLink() {
  const link = document.getElementById('answerLinkInput').value.trim();
  if (!link || !pc || !isOfferer) return alert('채팅을 먼저 시작하세요.');
  try {
    const u = new URL(link); const hp = new URLSearchParams(u.hash.substring(1));
    if (hp.has('answer')) await pc.setRemoteDescription(decodeSDP(hp.get('answer')));
  } catch (e) { alert('올바르지 않은 Answer 링크입니다.'); }
}

async function initiateAnswer(offer) {
  isOfferer = false; initPC();
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitIce();
  document.getElementById('answerSpinner').style.display = 'none';
  document.getElementById('answerReadyPanel').classList.remove('hidden');
  document.getElementById('answerLinkDisplay').textContent = location.origin + location.pathname + '#answer=' + encodeSDP(pc.localDescription);
}

async function createAnswerFromOffer() {
  const input = document.getElementById('remoteOfferSDP').value.trim();
  if (!input) return;
  closeConnection(); isOfferer = false; initPC();
  let offerStr = input;
  if (input.startsWith('http')) { const u = new URL(input); const hp = new URLSearchParams(u.hash.substring(1)); if (!hp.has('offer')) return alert('잘못된 링크'); offerStr = hp.get('offer'); }
  await pc.setRemoteDescription(decodeSDP(offerStr));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await waitIce();
  document.getElementById('localAnswerLinkDisplay').textContent = location.origin + location.pathname + '#answer=' + encodeSDP(pc.localDescription);
  document.getElementById('answerResultPanel').classList.remove('hidden');
}

function initPC() {
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] });
  pc.oniceconnectionstatechange = () => {
    const state = pc.iceConnectionState;
    updateConnectionStatus(state === 'connected' || state === 'completed');
    if (state === 'disconnected') pc.restartIce();
    if (state === 'failed' || state === 'closed') updateConnectionStatus(false);
  };
  pc.ondatachannel = (e) => {
    if (e.channel.label === 'chat') {
      if (dc) dc.close();
      dc = e.channel; setupDC();
    } else if (e.channel.label === 'typing') {
      if (typingChannel) typingChannel.close();
      typingChannel = e.channel; setupTyping();
    }
  };
}

function createChannels() {
  if (!pc || !isOfferer) return;
  if (dc) dc.close(); if (typingChannel) typingChannel.close();
  dc = pc.createDataChannel('chat', { ordered: true });
  typingChannel = pc.createDataChannel('typing', { ordered: false, maxRetransmits: 0 });
  setupDC(); setupTyping();
}

function setupDC() {
  if (!dc) return;
  dc.onopen = () => {
    updateConnectionStatus(true);
    showChat(); flushOutbox();
    if (!handshakeDone && !sessionKey) startEcdhExchange();
  };
  dc.onmessage = onMsg;
  dc.onclose = () => updateConnectionStatus(false);
}

function setupTyping() {
  if (!typingChannel) return;
  typingChannel.onmessage = (e) => {
    if (typeof e.data === 'string') document.getElementById('typingIndicator').style.display = e.data === '1' ? 'block' : 'none';
  };
}

function waitIce() { return new Promise(r => { if (pc.iceGatheringState === 'complete') r(); else pc.addEventListener('icegatheringstatechange', () => { if (pc.iceGatheringState === 'complete') r(); }); }); }

// ---------- 암호화 엔진 ----------
const textEncoder = new TextEncoder(), textDecoder = new TextDecoder();
const str2buf = (s) => textEncoder.encode(s);
const buf2hex = (b) => [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join('');
const buf2b64 = (b) => btoa(String.fromCharCode(...new Uint8Array(b)));
const b642buf = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0)).buffer;
const concatBufs = (...bufs) => { let len = bufs.reduce((a,b) => a + b.byteLength, 0), tmp = new Uint8Array(len), off = 0; bufs.forEach(b => { tmp.set(new Uint8Array(b), off); off += b.byteLength; }); return tmp.buffer; };

async function startEcdhExchange() {
  const keyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey', 'deriveBits']);
  ourEcdhPair = { privateKey: keyPair.privateKey, publicKey: keyPair.publicKey };
  const pubRaw = await crypto.subtle.exportKey('raw', ourEcdhPair.publicKey);
  if (isOfferer) { salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE)); dc.send(JSON.stringify({ type: '__ecdhe__', salt: buf2b64(salt.buffer), pubKey: buf2b64(pubRaw) })); }
  else { dc.send(JSON.stringify({ type: '__ecdhe__', pubKey: buf2b64(pubRaw) })); }
}

async function handleEcdhe(data) {
  if (handshakeDone) return;
  if (data.salt) salt = new Uint8Array(b642buf(data.salt));
  peerEcdhPub = await crypto.subtle.importKey('raw', b642buf(data.pubKey), ECDH_ALG, true, []);
  if (password && ourEcdhPair && peerEcdhPub && salt) await deriveSessionKey();
}

async function submitPassword() {
  const errEl = document.getElementById('passwordError');
  errEl.style.display = 'none';
  password = document.getElementById('chatPasswordInput').value.trim();
  if (!password) { errEl.textContent = '암호를 입력하세요.'; errEl.style.display = 'block'; return; }
  if (!salt || !ourEcdhPair || !peerEcdhPub) { errEl.textContent = '연결 준비 중...'; errEl.style.display = 'block'; return; }
  if (handshakeDone) return;
  try {
    await deriveAuthKey(); await deriveSessionKey(); handshakeDone = true;
    document.getElementById('passwordPrompt').classList.add('hidden');
    document.getElementById('securityCard').style.display = 'flex';
    addMsg('🔐 세션 활성화', 'system');
  } catch (e) { errEl.textContent = '세션 키 실패: ' + e.message; errEl.style.display = 'block'; }
}

async function deriveAuthKey() {
  const km = await crypto.subtle.importKey('raw', str2buf(password), 'PBKDF2', false, ['deriveKey']);
  authKey = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: PBKDF2_ITERS, hash: 'SHA-512' }, km, { name: 'AES-GCM', length: AES_LEN }, true, ['encrypt', 'decrypt']);
}

async function deriveSessionKey() {
  const ecdhBits = await crypto.subtle.deriveBits({ name: 'ECDH', public: peerEcdhPub }, ourEcdhPair.privateKey, 521);
  const authRaw = await crypto.subtle.exportKey('raw', authKey);
  const ikm = concatBufs(ecdhBits, str2buf(password));
  const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveKey']);
  sessionKey = await crypto.subtle.deriveKey({ name: 'HKDF', hash: 'SHA-512', salt: authRaw, info: str2buf('session') }, hkdfKey, { name: 'AES-GCM', length: AES_LEN }, true, ['encrypt', 'decrypt']);
  const sb = await crypto.subtle.exportKey('raw', sessionKey);
  const chainA = await hkdfExpand(sb, str2buf('chain-a'));
  const chainB = await hkdfExpand(sb, str2buf('chain-b'));
  const ourPub = await crypto.subtle.exportKey('raw', ourEcdhPair.publicKey);
  const peerPub = await crypto.subtle.exportKey('raw', peerEcdhPub);
  const weSmall = compareBuffers(new Uint8Array(ourPub), new Uint8Array(peerPub)) < 0;
  sendChain = weSmall ? { chain: chainA, seq: 0 } : { chain: chainB, seq: 0 };
  recvChain = weSmall ? { chain: chainB, seq: -1 } : { chain: chainA, seq: -1 };
  document.getElementById('sessionFingerprint').textContent = buf2hex(await crypto.subtle.digest('SHA-256', sb)).slice(0, 32);
}

function compareBuffers(b1, b2) { for (let i = 0; i < b1.byteLength; i++) { if (b1[i] < b2[i]) return -1; if (b1[i] > b2[i]) return 1; } return 0; }
async function hkdfExpand(prk, info) { const k = await crypto.subtle.importKey('raw', prk, { name: 'HMAC', hash: HMAC_HASH }, false, ['sign']); const s = await crypto.subtle.sign('HMAC', k, info); return crypto.subtle.importKey('raw', s.slice(0, 32), { name: 'HMAC', hash: HMAC_HASH }, false, ['sign']); }
async function ratchetForward(ref) { const cur = ref.chain; const newC = await crypto.subtle.sign('HMAC', cur, new Uint8Array([2])); ref.chain = await crypto.subtle.importKey('raw', newC.slice(0, 32), { name: 'HMAC', hash: HMAC_HASH }, false, ['sign']); const msgKey = await crypto.subtle.sign('HMAC', cur, new Uint8Array([1])); return crypto.subtle.importKey('raw', msgKey.slice(0, 32), { name: 'AES-GCM', length: AES_LEN }, false, ['encrypt', 'decrypt']); }
async function encryptPayload(obj) { if (!sendChain) throw new Error('세션키 없음'); const mk = await ratchetForward(sendChain); const iv = crypto.getRandomValues(new Uint8Array(12)); const padded = { ...obj, _pad: Math.random().toString(36).slice(2, 10) }; const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, mk, str2buf(JSON.stringify(padded))); return { seq: sendChain.seq++, iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) }; }
async function decryptPayload(d) { if (!recvChain) throw new Error('세션키 없음'); const { seq, iv, ct } = d; const prevChain = recvChain.chain, prevSeq = recvChain.seq; try { if (seq <= recvChain.seq) throw new Error('Invalid seq'); while (recvChain.seq < seq - 1) { await ratchetForward(recvChain); recvChain.seq++; } const mk = await ratchetForward(recvChain); recvChain.seq = seq; const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, mk, new Uint8Array(ct)); const obj = JSON.parse(textDecoder.decode(plain)); delete obj._pad; return obj; } catch (e) { recvChain.chain = prevChain; recvChain.seq = prevSeq; throw e; } }

// ---------- 메시지 전송/수신 ----------
async function sendText() {
  const inp = document.getElementById('msgInput');
  const txt = inp.value.trim();
  if (!txt) return;
  const id = Math.random().toString(36).slice(2, 10);
  const payload = { type: 'text', content: txt, id };
  if (!dc || dc.readyState !== 'open' || !sessionKey) {
    if (sessionKey) { pendingOutbox.push({ payload, id }); addMsg(txt, 'me', id); addMsg('⏳ 오프라인 - 전송 대기', 'system'); }
    else addMsg('⚠️ 암호를 설정하세요.', 'system');
    inp.value = ''; return;
  }
  try { const enc = await encryptPayload(payload); dc.send(JSON.stringify({ type: 'msg', ...enc })); addMsg(txt, 'me', id); } catch (e) { addMsg('⚠️ 전송 실패', 'system'); }
  inp.value = '';
}

function onMsg(e) {
  if (e.data instanceof ArrayBuffer) return;
  try {
    const d = JSON.parse(e.data);
    if (d.type === '__ecdhe__') { handleEcdhe(d); return; }
    if (d.type === 'msg') {
      if (!sessionKey) { addEncryptedMessage(d); return; }
      decryptPayload(d).then(inner => {
        if (inner.id && receivedMessageIds.has(inner.id)) return;
        if (inner.id) receivedMessageIds.add(inner.id);
        if (inner.type === 'text') { addMsg(inner.content, 'other', inner.id); }
        else if (inner.type === '__destroy__') { markDestroyed(); executeDestroy(); }
      }).catch(() => addEncryptedMessage(d));
    }
  } catch (e) {}
}

async function destroyChat() {
  if (!sessionKey || !dc || dc.readyState !== 'open') { markDestroyed(); executeDestroy(); return; }
  if (!confirm('⚠️ 대화를 완전히 삭제합니까?\n복구는 불가능합니다.')) return;
  try { const enc = await encryptPayload({ type: '__destroy__' }); dc.send(JSON.stringify({ type: 'msg', ...enc })); } catch (e) {}
  markDestroyed(); executeDestroy();
}

// ---------- UI 헬퍼 ----------
function addMsg(text, who, id) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (who === 'me' ? 'me' : who === 'other' ? 'other' : 'system');
  if (id) div.id = 'msg-' + id;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (who !== 'system') {
    const body = document.createElement('span');
    body.textContent = text;
    body.className = 'blur-target';
    bubble.appendChild(body);
  } else {
    bubble.textContent = text;
  }
  div.appendChild(bubble);
  const time = document.createElement('div');
  time.className = 'time';
  time.textContent = new Date().toLocaleTimeString();
  if (who === 'me' && id) {
    const delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.style = 'background:none; border:none; color:var(--danger); cursor:pointer;';
    delBtn.onclick = () => div.remove();
    time.appendChild(delBtn);
  }
  div.appendChild(time);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  if (who !== 'system') applyBlurToMessageBodies();
}

function addEncryptedMessage(rawData) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="encrypted-bubble"><strong>🔒 암호화된 메시지</strong><br>${escapeHtml(JSON.stringify(rawData, null, 2))}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function flushOutbox() {
  if (!dc || dc.readyState !== 'open' || pendingOutbox.length === 0) return;
  const toSend = [...pendingOutbox]; pendingOutbox = [];
  toSend.forEach(msg => { try { dc.send(JSON.stringify({ type: 'msg', ...msg.enc })); } catch (e) {} });
}

async function sendTyping(state) { if (typingChannel && typingChannel.readyState === 'open') typingChannel.send(state ? '1' : '0'); }

function showJoinPanel() {
  document.getElementById('offerPanel').classList.add('hidden');
  document.getElementById('answerPanel').classList.remove('hidden');
  document.getElementById('autoAnswerContent').classList.add('hidden');
  document.getElementById('manualJoinContent').classList.remove('hidden');
}

function closeConnection() {
  if (pc) { pc.close(); pc = null; }
  dc = null; typingChannel = null;
  authKey = sessionKey = null; sendChain = recvChain = null;
  salt = null; ourEcdhPair = null; peerEcdhPub = null; password = null; handshakeDone = false;
  receivedMessageIds.clear(); pendingOutbox = [];
  document.getElementById('sessionFingerprint').textContent = '';
  document.getElementById('securityCard').style.display = 'none';
  document.getElementById('passwordPrompt').classList.remove('hidden');
  document.getElementById('passwordError').style.display = 'none';
}

function copyTextById(id) { const el = document.getElementById(id); navigator.clipboard.writeText(el.textContent).catch(() => alert('복사 실패')); }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]); }

// ---------- 타이핑 인디케이터 ----------
document.getElementById('msgInput').addEventListener('input', () => {
  sendTyping(true);
  clearTimeout(window.typingTimer);
  window.typingTimer = setTimeout(() => sendTyping(false), 1500);
});

// ---------- 초기화 ----------
(async function init() {
  if (isDestroyed()) executeDestroy();
  checkHash();
  window.addEventListener('hashchange', checkHash);
})();

async function checkHash() {
  if (isDestroyed()) return;
  const h = location.hash.substring(1);
  if (!h) return;
  const p = new URLSearchParams(h);
  if (p.has('offer')) {
    try {
      const offer = decodeSDP(p.get('offer'));
      if (pc && isOfferer) return;
      closeConnection();
      document.getElementById('simpleMode').querySelector('.card').classList.add('hidden');
      document.getElementById('answerPanel').classList.remove('hidden');
      document.getElementById('autoAnswerContent').classList.remove('hidden');
      document.getElementById('manualJoinContent').classList.add('hidden');
      document.getElementById('answerSpinner').style.display = 'inline-block';
      document.getElementById('answerReadyPanel').classList.add('hidden');
      await initiateAnswer(offer);
    } catch (e) { alert('잘못된 초대 링크입니다.'); }
  } else if (p.has('answer')) {
    if (!pc || !isOfferer) {
      alert('채팅을 먼저 시작한 후 Answer 링크를 적용하세요.');
      return;
    }
    try {
      const answer = decodeSDP(p.get('answer'));
      await pc.setRemoteDescription(answer);
    } catch (e) { alert('잘못된 Answer 링크입니다.'); }
  }
}
</script>
